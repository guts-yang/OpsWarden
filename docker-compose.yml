version: "3.8"

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: opswarden-postgres
    restart: always
    environment:
      POSTGRES_PASSWORD: 342802
      POSTGRES_DB: opswarden
      TZ: Asia/Shanghai
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

volumes:
  postgres_data:
