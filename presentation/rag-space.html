<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OpsWarden · RAG 向量空间可视化</title>
<style>
  :root{
    --orange:#ff6700; --orange-soft:#ff8a3d; --blue:#1a73e8; --green:#34a853;
    --bg:#0c0c0f; --bg2:#15151a; --bg3:#1c1c23; --text:#f5f5f7; --dim:#9aa0aa;
    --line:#2a2a33; --red:#e0533d; --purple:#9b6dff;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;height:100%;background:var(--bg);color:var(--text);
    font-family:"PingFang SC","Microsoft YaHei","Inter",system-ui,sans-serif;overflow:hidden}
  body{background:radial-gradient(1100px 650px at 85% -8%,#241307 0%,var(--bg) 55%);}
  code{font-family:"SF Mono",Consolas,Monaco,monospace;background:#000;color:var(--orange-soft);
    padding:1px 5px;border-radius:5px;font-size:.86em;border:1px solid var(--line)}

  .app{display:flex;flex-direction:column;height:100vh;}
  header{display:flex;align-items:center;justify-content:space-between;gap:16px;
    padding:12px 20px;border-bottom:1px solid var(--line);flex-wrap:wrap}
  header .title .kick{font-size:11px;font-weight:800;letter-spacing:.26em;color:var(--orange);text-transform:uppercase}
  header .title h1{margin:2px 0 0;font-size:20px;font-weight:900}
  header .title h1 .ow{color:var(--orange)}
  .tabs{display:flex;gap:8px}
  .tab{cursor:pointer;border:1px solid var(--line);background:var(--bg2);color:var(--dim);
    padding:9px 16px;border-radius:999px;font-size:13px;font-weight:800;transition:.15s;white-space:nowrap}
  .tab .n{display:inline-flex;align-items:center;justify-content:center;width:18px;height:18px;border-radius:50%;
    background:var(--bg3);color:var(--dim);font-size:11px;margin-right:7px}
  .tab:hover{color:var(--text);border-color:#3a3a45}
  .tab.active{background:var(--orange);color:#1a0e03;border-color:var(--orange)}
  .tab.active .n{background:rgba(0,0,0,.25);color:#1a0e03}

  main{flex:1;display:flex;min-height:0}
  .stage{flex:1;position:relative;min-width:0}
  canvas{display:block;width:100%;height:100%;cursor:crosshair}
  .stagehint{position:absolute;left:16px;bottom:14px;font-size:12px;color:var(--dim);
    background:rgba(0,0,0,.45);border:1px solid var(--line);border-radius:8px;padding:7px 11px;backdrop-filter:blur(4px);max-width:60%}
  .stagehint b{color:var(--orange-soft)}

  aside{width:340px;flex:none;border-left:1px solid var(--line);background:rgba(12,12,15,.6);
    overflow-y:auto;padding:16px 16px 28px}
  aside::-webkit-scrollbar{width:8px}aside::-webkit-scrollbar-thumb{background:#2c2c35;border-radius:8px}

  .card{background:var(--bg2);border:1px solid var(--line);border-radius:12px;padding:14px 15px;margin-bottom:14px}
  .card h3{margin:0 0 6px;font-size:13px;font-weight:800;letter-spacing:.02em;display:flex;align-items:center;gap:8px}
  .card h3 .dot{width:9px;height:9px;border-radius:50%;background:var(--orange)}
  .card p{margin:0;font-size:12.5px;line-height:1.65;color:#cfd2d8}
  .step{font-size:12.5px;line-height:1.6;color:#cfd2d8;margin:8px 0 0;padding-left:24px;position:relative}
  .step b{color:var(--orange-soft)}
  .step .si{position:absolute;left:0;top:1px;width:17px;height:17px;border-radius:50%;background:var(--bg3);
    border:1px solid var(--line);color:var(--orange);font-size:10px;font-weight:800;display:flex;align-items:center;justify-content:center}

  .ctl{margin-bottom:12px}
  .ctl label{display:flex;justify-content:space-between;font-size:12px;font-weight:700;color:var(--dim);margin-bottom:6px}
  .ctl label b{color:var(--orange-soft);font-variant-numeric:tabular-nums}
  input[type=range]{width:100%;-webkit-appearance:none;height:5px;border-radius:5px;background:#2c2c35;outline:none}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;
    background:var(--orange);cursor:pointer;border:2px solid #1a0e03}
  .toggles{display:flex;flex-wrap:wrap;gap:7px}
  .tg{cursor:pointer;border:1px solid var(--line);background:var(--bg3);color:var(--dim);
    padding:5px 10px;border-radius:7px;font-size:11.5px;font-weight:700;user-select:none}
  .tg.on{background:rgba(255,103,0,.16);border-color:var(--orange);color:var(--orange-soft)}
  .btns{display:flex;gap:8px;flex-wrap:wrap}
  .btn{cursor:pointer;flex:1;min-width:120px;text-align:center;border:1px solid var(--line);background:var(--bg3);
    color:var(--text);padding:9px;border-radius:9px;font-size:12.5px;font-weight:800}
  .btn:hover{border-color:var(--orange)}
  .btn.primary{background:var(--orange);color:#1a0e03;border-color:var(--orange)}

  .verdict{border-radius:10px;padding:11px 13px;font-size:13px;font-weight:800;margin-bottom:12px;border:1px solid}
  .verdict.hit{background:rgba(52,168,83,.14);border-color:var(--green);color:#8be0a3}
  .verdict.miss{background:rgba(255,103,0,.14);border-color:var(--orange);color:var(--orange-soft)}

  .rank{display:flex;align-items:center;gap:9px;font-size:12px;margin:7px 0}
  .rank .badge{width:20px;height:20px;border-radius:6px;flex:none;display:flex;align-items:center;justify-content:center;
    font-weight:800;font-size:11px;background:var(--bg3);border:1px solid var(--line);color:var(--dim)}
  .rank.hit .badge{background:var(--green);color:#06210f;border-color:var(--green)}
  .rank .nm{flex:none;width:78px;color:#cfd2d8;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .rank .bar{flex:1;height:7px;border-radius:5px;background:#23232b;overflow:hidden}
  .rank .bar i{display:block;height:100%;background:linear-gradient(90deg,var(--orange-soft),var(--orange))}
  .rank.hit .bar i{background:linear-gradient(90deg,#48d178,var(--green))}
  .rank .sc{flex:none;width:42px;text-align:right;font-variant-numeric:tabular-nums;color:var(--text);font-weight:700}

  .legend{display:flex;flex-wrap:wrap;gap:10px 14px;font-size:11.5px;color:var(--dim)}
  .legend span{display:flex;align-items:center;gap:6px}
  .legend i{width:11px;height:11px;border-radius:3px;display:inline-block}

  @media (max-width:920px){
    main{flex-direction:column}
    aside{width:100%;border-left:none;border-top:1px solid var(--line);max-height:46vh}
    .stage{min-height:46vh}
  }
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="title">
      <div class="kick">向量空间几何可视化</div>
      <h1><span class="ow">OpsWarden</span> RAG · 空间如何划分 / 整理数据 / 检索</h1>
    </div>
    <div class="tabs">
      <div class="tab active" data-mode="overview"><span class="n">0</span>向量空间</div>
      <div class="tab" data-mode="ingest"><span class="n">1</span>整理数据</div>
      <div class="tab" data-mode="search"><span class="n">2</span>检索</div>
    </div>
  </header>

  <main>
    <div class="stage">
      <canvas id="cv"></canvas>
      <div class="stagehint" id="hint"></div>
    </div>

    <aside>
      <!-- 动态解说卡 -->
      <div class="card" id="explainCard">
        <h3><span class="dot"></span><span id="exTitle">向量空间</span></h3>
        <div id="exBody"></div>
      </div>

      <!-- 检索结果（仅检索模式） -->
      <div id="searchPanel" style="display:none">
        <div class="verdict" id="verdict"></div>
        <div class="card">
          <h3><span class="dot"></span>L2 精排结果（候选条目）</h3>
          <div id="ranks"></div>
        </div>
      </div>

      <!-- 参数 -->
      <div class="card">
        <h3><span class="dot"></span>参数</h3>
        <div class="ctl">
          <label>量化粒度 ε（网格大小）<b id="vEps">0.25</b></label>
          <input type="range" id="rEps" min="0.12" max="0.45" step="0.01" value="0.25">
        </div>
        <div class="ctl">
          <label>L1 召回锚点数 <b id="vAk">4</b></label>
          <input type="range" id="rAk" min="1" max="8" step="1" value="4">
        </div>
        <div class="ctl">
          <label>相似度阈值（命中线）<b id="vTh">0.40</b></label>
          <input type="range" id="rTh" min="0.10" max="0.90" step="0.01" value="0.40">
        </div>
        <div class="ctl">
          <label>Top-K 返回 <b id="vTk">3</b></label>
          <input type="range" id="rTk" min="1" max="6" step="1" value="3">
        </div>
      </div>

      <!-- 显示开关 -->
      <div class="card">
        <h3><span class="dot"></span>显示</h3>
        <div class="toggles">
          <div class="tg on" data-tg="grid">量化网格</div>
          <div class="tg on" data-tg="anchor">锚点</div>
          <div class="tg on" data-tg="cone">接受锥</div>
          <div class="tg on" data-tg="link">连线</div>
          <div class="tg on" data-tg="label">类别</div>
        </div>
      </div>

      <!-- 操作 -->
      <div class="card">
        <h3><span class="dot"></span>操作</h3>
        <div class="btns">
          <div class="btn primary" id="btnPlay">▶ 播放整理动画</div>
          <div class="btn" id="btnGen">↻ 重新生成数据</div>
        </div>
        <p style="margin-top:10px;color:var(--dim);font-size:11.5px" id="opHint"></p>
      </div>

      <!-- 图例 -->
      <div class="card">
        <h3><span class="dot"></span>图例</h3>
        <div class="legend">
          <span><i style="background:#5b8cff"></i>知识条目向量</span>
          <span><i style="background:#fff;outline:2px solid var(--orange)"></i>锚点 kb_anchors</span>
          <span><i style="background:var(--orange)"></i>查询向量</span>
          <span><i style="background:rgba(52,168,83,.5)"></i>命中 Top-K</span>
          <span><i style="background:rgba(255,103,0,.25)"></i>L1 命中网格</span>
        </div>
      </div>
    </aside>
  </main>
</div>

<script>
(function(){
  "use strict";
  const cv = document.getElementById('cv');
  const ctx = cv.getContext('2d');
  const PAL = {orange:'#ff6700',orangeS:'#ff8a3d',blue:'#1a73e8',green:'#34a853',
    text:'#f5f5f7',dim:'#9aa0aa',line:'#2a2a33',red:'#e0533d',entry:'#5b8cff'};

  // ---- 状态 ----
  const S = {
    mode:'overview',
    eps:0.25, anchorK:4, threshold:0.40, topK:3,
    show:{grid:true,anchor:true,cone:true,link:true,label:true},
    entries:[], anchors:[],
    query:{x:Math.cos(0.5),y:Math.sin(0.5)},
    ingestT:1,         // 0..1 整理动画进度（1=完成）
    playing:false, playStart:0,
    dragging:false,
    W:0,H:0,cx:0,cy:0,R:1,dpr:1
  };

  // 运维类别（语义簇）
  const CATS = [
    {name:'网络故障', color:'#5b8cff'},
    {name:'权限申请', color:'#9b6dff'},
    {name:'账号问题', color:'#46c1c9'},
    {name:'邮件配置', color:'#e0b84d'},
    {name:'VPN 接入', color:'#e0533d'},
    {name:'系统报错', color:'#4fd17a'},
  ];

  function rand(a,b){return a+Math.random()*(b-a);}
  function gauss(s){let u=0,v=0;while(!u)u=Math.random();while(!v)v=Math.random();
    return s*Math.sqrt(-2*Math.log(u))*Math.cos(2*Math.PI*v);}
  function norm(p){const l=Math.hypot(p.x,p.y)||1;return {x:p.x/l,y:p.y/l};}
  function cos(a,b){return a.x*b.x+a.y*b.y;} // 单位向量 → 点积=余弦

  // 生成聚类数据：在单位圆上按角度成簇，模拟“语义相近→方向相近”
  function generate(){
    S.entries=[];
    // 给类别分配中心角度，故意留出空白弧（底部）以演示未命中
    const baseAngles=[ -0.55, 0.05, 0.65, 1.25, 1.95, 2.75 ]; // 弧度，集中在上/右半
    CATS.forEach((c,ci)=>{
      const center = baseAngles[ci] + gauss(0.05);
      const n = Math.round(rand(4,8));
      for(let i=0;i<n;i++){
        const ang = center + gauss(0.16);
        const p = norm({x:Math.cos(ang),y:Math.sin(ang)});
        S.entries.push({x:p.x,y:p.y,cat:ci,catName:c.name,color:c.color,
          ord:Math.random()}); // ord 用于整理动画分批
      }
    });
    S.entries.sort((a,b)=>a.ord-b.ord);
    buildAnchors();
  }

  // 量化 + 落桶 → 锚点
  function buildAnchors(){
    const eps=S.eps, map=new Map();
    S.entries.forEach((e,idx)=>{
      const ix=Math.round(e.x/eps), iy=Math.round(e.y/eps);
      const key=ix+','+iy;
      e.cell=key; e.ix=ix; e.iy=iy;
      if(!map.has(key)) map.set(key,{ix,iy,key,
        cx:ix*eps, cy:iy*eps, entries:[]});
      map.get(key).entries.push(idx);
    });
    // 锚点方向（归一化的网格中心），用于 L1 余弦路由
    S.anchors=[...map.values()].map(a=>{
      const d=norm({x:a.cx,y:a.cy});
      return Object.assign(a,{dir:d});
    });
  }

  // ---- 坐标变换 ----
  function W2S(x,y){return {x:S.cx + x*S.R, y:S.cy - y*S.R};}
  function S2W(sx,sy){return {x:(sx-S.cx)/S.R, y:-(sy-S.cy)/S.R};}

  function resize(){
    const r=cv.parentElement.getBoundingClientRect();
    S.dpr=window.devicePixelRatio||1;
    S.W=r.width; S.H=r.height;
    cv.width=Math.round(r.width*S.dpr); cv.height=Math.round(r.height*S.dpr);
    ctx.setTransform(S.dpr,0,0,S.dpr,0,0);
    S.cx=r.width/2; S.cy=r.height/2;
    S.R=Math.min(r.width,r.height)*0.40;
    draw();
  }

  // ---- 检索计算 ----
  function compute(){
    const q=S.query;
    // L1：锚点按余弦排序，取前 anchorK
    const anc=S.anchors.map(a=>({a,score:cos(q,a.dir)})).sort((x,y)=>y.score-x.score);
    const topAnchors=anc.slice(0,S.anchorK).map(o=>o.a);
    const topSet=new Set(topAnchors.map(a=>a.key));
    // L2：候选条目（落在命中网格内）做全精度余弦精排
    const cand=[];
    S.entries.forEach((e,idx)=>{ if(topSet.has(e.cell)) cand.push({idx,e,score:cos(q,e)}); });
    cand.sort((x,y)=>y.score-x.score);
    const top=cand.slice(0,S.topK);
    const hit = top.length>0 && top[0].score>=S.threshold;
    return {topAnchors,topSet,cand,top,hit};
  }

  // ---- 绘制 ----
  function draw(){
    const r=compute();
    ctx.clearRect(0,0,S.W,S.H);

    // 量化网格
    if(S.show.grid && S.mode!=='overview' && S.ingestProg('grid')>0){
      const a=S.ingestProg('grid');
      ctx.lineWidth=1; ctx.strokeStyle='rgba(120,120,140,'+(0.16*a)+')';
      const eps=S.eps, lim=1.25;
      ctx.beginPath();
      for(let v=-Math.ceil(lim/eps)*eps; v<=lim; v+=eps){
        let p1=W2S(v,-lim),p2=W2S(v,lim); ctx.moveTo(p1.x,p1.y); ctx.lineTo(p2.x,p2.y);
        let p3=W2S(-lim,v),p4=W2S(lim,v); ctx.moveTo(p3.x,p3.y); ctx.lineTo(p4.x,p4.y);
      }
      ctx.stroke();
    }

    // L1 命中网格高亮（检索）
    if(S.mode==='search'){
      const eps=S.eps;
      r.topAnchors.forEach(a=>{
        const c0=W2S((a.ix-0.5)*eps,(a.iy+0.5)*eps);
        ctx.fillStyle='rgba(255,103,0,0.13)';
        ctx.strokeStyle='rgba(255,103,0,0.55)'; ctx.lineWidth=1.5;
        ctx.fillRect(c0.x,c0.y,eps*S.R,eps*S.R);
        ctx.strokeRect(c0.x,c0.y,eps*S.R,eps*S.R);
      });
    }

    // 接受锥（余弦阈值 → 角度扇区）
    if(S.mode==='search' && S.show.cone){
      const q=norm(S.query); const ang=Math.atan2(q.y,q.x);
      const half=Math.acos(Math.max(-1,Math.min(1,S.threshold)));
      const c=W2S(0,0), rad=S.R*1.3;
      ctx.beginPath(); ctx.moveTo(c.x,c.y);
      ctx.arc(c.x,c.y,rad,-(ang+half),-(ang-half)); // 注意 y 轴翻转
      ctx.closePath();
      ctx.fillStyle='rgba(52,168,83,0.10)'; ctx.fill();
      ctx.strokeStyle='rgba(52,168,83,0.35)'; ctx.lineWidth=1.2; ctx.stroke();
    }

    // 单位圆（向量归一化后所在的“超球面”投影）
    const o=W2S(0,0);
    ctx.beginPath(); ctx.arc(o.x,o.y,S.R,0,Math.PI*2);
    ctx.strokeStyle='rgba(255,255,255,0.16)'; ctx.lineWidth=1.4; ctx.stroke();
    // 原点
    ctx.beginPath(); ctx.arc(o.x,o.y,3,0,Math.PI*2); ctx.fillStyle=PAL.dim; ctx.fill();

    // 查询→锚点连线（L1 路由）
    if(S.mode==='search' && S.show.link){
      const qs=W2S(S.query.x,S.query.y);
      r.topAnchors.forEach(a=>{
        const as=W2S(a.dir.x,a.dir.y);
        ctx.beginPath(); ctx.moveTo(qs.x,qs.y); ctx.lineTo(as.x,as.y);
        ctx.strokeStyle='rgba(255,138,61,0.45)'; ctx.lineWidth=1.2; ctx.setLineDash([4,4]);
        ctx.stroke(); ctx.setLineDash([]);
      });
    }

    // 知识条目向量
    const reveal = S.mode==='ingest' ? S.ingestProg('points') : 1;
    const nShow = Math.round(S.entries.length*reveal);
    const candSet = new Set(r.cand.map(c=>c.idx));
    const topIdx = new Set(r.top.map(c=>c.idx));
    S.entries.forEach((e,idx)=>{
      if(S.mode==='ingest' && idx>=nShow) return;
      const p=W2S(e.x,e.y);
      let rad=4.5, fill=e.color, alpha=1, ring=null;
      if(S.mode==='search'){
        if(topIdx.has(idx)){ rad=7; ring=PAL.green; }
        else if(candSet.has(idx)){ rad=5; alpha=0.95; }
        else { alpha=0.32; }
      }
      ctx.globalAlpha=alpha;
      ctx.beginPath(); ctx.arc(p.x,p.y,rad,0,Math.PI*2); ctx.fillStyle=fill; ctx.fill();
      if(ring){ ctx.lineWidth=2.5; ctx.strokeStyle=ring; ctx.stroke(); }
      ctx.globalAlpha=1;
    });

    // 锚点
    if(S.show.anchor && S.mode!=='overview'){
      const a=S.ingestProg('anchor');
      const nA=Math.round(S.anchors.length*a);
      S.anchors.slice(0,nA).forEach(an=>{
        const p=W2S(an.dir.x,an.dir.y);
        const hot = S.mode==='search' && r.topSet.has(an.key);
        ctx.beginPath(); ctx.arc(p.x,p.y, hot?8:6.5,0,Math.PI*2);
        ctx.fillStyle=hot?PAL.orange:'#ffffff';
        ctx.fill(); ctx.lineWidth=2.5; ctx.strokeStyle=PAL.orange; ctx.stroke();
      });
    }

    // 查询向量
    if(S.mode==='search'){
      const qs=W2S(S.query.x,S.query.y);
      ctx.beginPath(); ctx.moveTo(o.x,o.y); ctx.lineTo(qs.x,qs.y);
      ctx.strokeStyle=PAL.orange; ctx.lineWidth=2; ctx.stroke();
      ctx.beginPath(); ctx.arc(qs.x,qs.y,9,0,Math.PI*2);
      ctx.fillStyle=PAL.orange; ctx.fill();
      ctx.fillStyle='#1a0e03'; ctx.font='bold 11px sans-serif';
      ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText('Q',qs.x,qs.y);
    }

    // Top-K 排名标号
    if(S.mode==='search'){
      r.top.forEach((c,i)=>{
        const p=W2S(c.e.x,c.e.y);
        ctx.beginPath(); ctx.arc(p.x+11,p.y-11,8,0,Math.PI*2);
        ctx.fillStyle = c.score>=S.threshold?PAL.green:'#3a3a45'; ctx.fill();
        ctx.fillStyle='#fff'; ctx.font='bold 10px sans-serif';
        ctx.textAlign='center'; ctx.textBaseline='middle';
        ctx.fillText(String(i+1),p.x+11,p.y-11);
      });
    }

    // 类别标签（总览/整理）
    if(S.show.label && S.mode!=='search'){
      const used=new Map();
      S.entries.forEach(e=>{ if(!used.has(e.cat)) used.set(e.cat,e); });
      ctx.font='bold 12px sans-serif'; ctx.textAlign='left'; ctx.textBaseline='middle';
      used.forEach((e)=>{
        const p=W2S(e.x*1.12,e.y*1.12);
        ctx.fillStyle=e.color; ctx.globalAlpha=.9;
        ctx.fillText(e.catName,p.x,p.y); ctx.globalAlpha=1;
      });
    }

    if(S.mode==='search') renderPanel(r);
  }

  // 整理动画分段进度
  S.ingestProg=function(part){
    if(S.mode!=='ingest') return 1;
    const t=S.ingestT; // 0..1
    if(part==='points') return Math.min(1, t/0.45);
    if(part==='grid')   return Math.max(0, Math.min(1,(t-0.40)/0.25));
    if(part==='anchor') return Math.max(0, Math.min(1,(t-0.62)/0.38));
    return 1;
  };

  // ---- 侧栏 ----
  const EX = {
    overview:{t:'向量空间（超球面）',b:`
      <p>每条知识用 <code>BGE-small-zh</code> 编码成 <b>512 维向量</b>并 <b>L2 归一化</b>，因此所有向量都落在<b>单位超球面</b>上。这里把它投影到 2D 单位圆。</p>
      <p style="margin-top:8px">关键直觉：<b>方向越接近 = 语义越相近</b>，相似度用<b>余弦</b>（=两向量夹角）。同一类问题（同色）天然聚成一簇。</p>`},
    ingest:{t:'整理数据：量化 + 落桶建锚点',b:`
      <p class="step"><span class="si">1</span><b>量化</b>：用粒度 ε 把空间切成<b>网格</b>，每个坐标四舍五入到网格点（<code>quantize_vector</code>）。</p>
      <p class="step"><span class="si">2</span><b>落桶</b>：落在同一网格单元的向量共享一个<b>锚点</b>（<code>kb_anchors</code>，SHA256 量化键去重）。</p>
      <p class="step"><span class="si">3</span><b>建索引</b>：条目挂到锚点下（<code>anchor_id</code>），锚点建 IVFFlat 近似索引。相似知识被自动归并到一起。</p>
      <p style="margin-top:10px;color:var(--dim)">点「▶ 播放整理动画」看：向量落点 → 网格浮现 → 锚点生成。调 ε 看网格粗细如何影响分桶。</p>`},
    search:{t:'检索：L1 粗筛 + L2 精排',b:`
      <p class="step"><span class="si">1</span><b>L1 路由</b>：查询向量 Q 找余弦最近的 <b>${''}</b> 个<b>锚点单元</b>（橙色高亮网格），缩小搜索范围。</p>
      <p class="step"><span class="si">2</span><b>L2 精排</b>：只在这些单元内的候选条目上做<b>全精度余弦</b>排序，取 Top-K。</p>
      <p class="step"><span class="si">3</span><b>判命中</b>：相似度 ≥ 阈值（落在绿色<b>接受锥</b>内）才算命中；否则未命中 → <b>触发工单</b>。</p>
      <p style="margin-top:10px;color:var(--dim)">拖动橙色 <b>Q</b> 点绕圆移动：对准某簇=命中，拖到空白弧=未命中。</p>`}
  };
  function renderExplain(){
    const e=EX[S.mode];
    document.getElementById('exTitle').textContent=e.t;
    document.getElementById('exBody').innerHTML=e.b;
    document.getElementById('searchPanel').style.display = S.mode==='search'?'block':'none';
    document.getElementById('btnPlay').style.display = S.mode==='ingest'?'block':'none';
    const hints={
      overview:'提示：<b>同色=同类问题</b>，方向相近即语义相近。切到「整理数据」看空间如何被划分。',
      ingest:'提示：拖动「量化粒度 ε」滑条 —— ε 越大网格越粗、锚点越少（召回快但糙）；ε 越小越精细。',
      search:'提示：<b>拖动橙色 Q 向量</b>。橙色网格=L1 命中桶，绿色扇区=余弦阈值接受锥，①②③=Top-K。'
    };
    document.getElementById('hint').innerHTML=hints[S.mode];
    const op={overview:'切到「整理数据 / 检索」分步演示空间操作。',
      ingest:'调 ε 后会自动重建锚点；点播放看分步动画。',
      search:'拖 Q 到簇中心=命中、拖到底部空白=未命中→工单。'};
    document.getElementById('opHint').textContent=op[S.mode];
  }
  function renderPanel(r){
    const v=document.getElementById('verdict');
    if(r.hit){ v.className='verdict hit'; v.textContent='✓ 命中知识库 — 最高相似度 '+r.top[0].score.toFixed(2)+' ≥ 阈值 '+S.threshold.toFixed(2); }
    else { v.className='verdict miss'; v.textContent='✗ 未命中 — 候选均低于阈值 '+S.threshold.toFixed(2)+'，将触发自动工单'; }
    const box=document.getElementById('ranks');
    if(r.cand.length===0){ box.innerHTML='<p style="color:var(--dim);font-size:12px;margin:0">L1 命中桶内暂无候选条目，调大「L1 召回锚点数」试试。</p>'; return; }
    box.innerHTML = r.cand.slice(0,6).map((c,i)=>{
      const isTop = i<S.topK; const isHit = isTop && c.score>=S.threshold;
      const w=Math.max(2,Math.round(((c.score+1)/2)*100));
      return `<div class="rank ${isHit?'hit':''}">
        <span class="badge">${isTop?(i+1):'·'}</span>
        <span class="nm" style="color:${c.e.color}">${c.e.catName}</span>
        <span class="bar"><i style="width:${w}%"></i></span>
        <span class="sc">${c.score.toFixed(2)}</span></div>`;
    }).join('');
  }

  // ---- 动画 ----
  function tick(ts){
    if(S.playing){
      if(!S.playStart) S.playStart=ts;
      S.ingestT=Math.min(1,(ts-S.playStart)/2600);
      draw();
      if(S.ingestT>=1){ S.playing=false; S.playStart=0; }
      else { requestAnimationFrame(tick); }
    }
  }
  function play(){
    if(S.mode!=='ingest') return;
    S.playing=true; S.playStart=0; S.ingestT=0;
    requestAnimationFrame(tick);
  }

  // ---- 交互 ----
  function setMode(m){
    S.mode=m;
    document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.dataset.mode===m));
    if(m==='ingest'){ S.ingestT=1; }      // 默认显示完成态，可点播放重看
    renderExplain(); draw();
  }
  document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>setMode(t.dataset.mode));

  function pointerToQuery(ev){
    const r=cv.getBoundingClientRect();
    const w=S2W(ev.clientX-r.left, ev.clientY-r.top);
    S.query=norm(w);
    draw();
  }
  cv.addEventListener('pointerdown',e=>{ if(S.mode!=='search')return; S.dragging=true; cv.setPointerCapture(e.pointerId); pointerToQuery(e); });
  cv.addEventListener('pointermove',e=>{ if(S.dragging) pointerToQuery(e); });
  cv.addEventListener('pointerup',()=>{S.dragging=false;});
  cv.addEventListener('pointerleave',()=>{S.dragging=false;});

  // 滑条
  function bind(id,key,vid,fmt,after){
    const el=document.getElementById(id);
    el.oninput=()=>{ S[key]= (key==='anchorK'||key==='topK')?parseInt(el.value):parseFloat(el.value);
      document.getElementById(vid).textContent=fmt(S[key]); if(after)after(); draw(); };
  }
  bind('rEps','eps','vEps',v=>v.toFixed(2),buildAnchors);
  bind('rAk','anchorK','vAk',v=>v);
  bind('rTh','threshold','vTh',v=>v.toFixed(2));
  bind('rTk','topK','vTk',v=>v);

  // 开关
  document.querySelectorAll('.tg').forEach(t=>t.onclick=()=>{
    const k=t.dataset.tg; S.show[k]=!S.show[k]; t.classList.toggle('on',S.show[k]); draw();
  });

  document.getElementById('btnPlay').onclick=play;
  document.getElementById('btnGen').onclick=()=>{ generate(); draw(); };

  window.addEventListener('resize',resize);

  // ---- init ----
  generate();
  renderExplain();
  resize();
})();
</script>
</body>
</html>
