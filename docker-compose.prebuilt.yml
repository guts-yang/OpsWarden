services:
  postgres:
    image: docker.1panel.live/pgvector/pgvector:pg16
    container_name: opswarden-postgres
    restart: always
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-342802}
      POSTGRES_DB: opswarden
      TZ: Asia/Shanghai
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    image: docker.1panel.live/library/python:3.11-slim-bookworm
    container_name: opswarden-backend
    restart: always
    working_dir: /app/backend
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:${POSTGRES_PASSWORD:-342802}@postgres:5432/opswarden
      PYTHONUNBUFFERED: 1
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app/backend
      - ./.env:/app/.env
      - hf_cache:/root/.cache/huggingface
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "pip config set global.index-url https://pypi.tuna.tsinghua.edu.cn/simple &&
             pip config set global.timeout 300 &&
             pip install --no-cache-dir -r /app/backend/requirements.txt &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"

  frontend:
    image: docker.1panel.live/library/nginx:alpine
    container_name: opswarden-frontend
    restart: always
    ports:
      - "8080:80"
    volumes:
      - ./frontend/dist:/usr/share/nginx/html:ro
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend

volumes:
  postgres_data:
  hf_cache:
