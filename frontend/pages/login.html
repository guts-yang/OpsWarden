<!DOCTYPE html>

<html lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>OpsWarden - 登录</title>

        theme: {
          extend: {
            colors: {
              "on-primary-container": "#525151",
              "surface-variant": "#dbe4e7",

              "surface-tint": "#5f5e5e",
              "secondary": "#0053dc",
              "on-secondary-fixed": "#003798",
              "on-error-container": "#752121",
              "surface-container-low": "#f1f4f6",
              "surface-container-highest": "#dbe4e7",
              "on-error": "#fff7f6",
              "surface-dim": "#d1dce0",
              "tertiary-fixed-dim": "#73f08c",
              "background": "#f8f9fa",
              "surface": "#f8f9fa",
              "secondary-container": "#dbe1ff",
              "on-secondary-fixed-variant": "#0050d4",
              "surface-container-high": "#e3e9ec",
              "primary-fixed": "#e5e2e1",
              "on-primary-fixed-variant": "#5c5b5b",
              "on-background": "#2b3437",
              "error-container": "#fe8983",
              "secondary-dim": "#0049c2",
              "on-primary-fixed": "#403f3f",
              "primary-fixed-dim": "#d6d4d3",
              "primary-dim": "#535252",
              "error": "#9f403d",
              "on-tertiary-fixed-variant": "#006c2d",
              "primary": "#5f5e5e",
              "error-dim": "#4e0309",
              "on-secondary-container": "#0048bf",
              "tertiary-fixed": "#82ff99",
              "on-surface": "#2b3437",
              "surface-bright": "#f8f9fa",
              "on-secondary": "#faf8ff",
              "primary-container": "#e5e2e1",
              "inverse-on-surface": "#9b9d9e",
              "inverse-primary": "#ffffff",
              "tertiary-container": "#82ff99",
              "tertiary-dim": "#006127",
              "on-surface-variant": "#586064",
              "on-tertiary": "#e9ffe6",
              "on-tertiary-fixed": "#004c1d",
              "surface-container": "#eaeff1",
              "tertiary": "#006e2e",
              "on-tertiary-container": "#006127",
              "outline-variant": "#abb3b7",
              "inverse-surface": "#0c0f10",
              "on-primary": "#faf7f6",
              "secondary-fixed-dim": "#c7d3ff",
              "secondary-fixed": "#dbe1ff",
              "surface-container-lowest": "#ffffff"
            },
            fontFamily: {
              "headline": ["Inter", "system-ui", "sans-serif"],
              "body": ["Inter", "system-ui", "sans-serif"],
              "label": ["Inter", "system-ui", "sans-serif"]
            },
            borderRadius: {
              "DEFAULT": "0.125rem",
              "lg": "0.25rem",

              "full": "9999px"

          },

<style>
        body { font-family: 'Inter', 'Microsoft YaHei', 'PingFang SC', sans-serif; -webkit-font-smoothing: antialiased; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 20; vertical-align: middle; }
        .ghost-border { border: 1px solid rgba(171, 179, 183, 0.15); }
    </style>
</head>
<body class="bg-background min-h-screen flex items-center justify-center p-4">
<main class="w-[400px] bg-surface-container-lowest ghost-border rounded-xl shadow-sm p-8 flex flex-col gap-8">
  <header class="flex items-center gap-2">
    <div class="w-5 h-5 bg-secondary rounded-full"></div>
    <span class="text-[18px] font-medium text-on-background tracking-tight">OpsWarden</span>
  </header>
  <section>
    <h1 class="text-[24px] font-medium text-on-background">登录</h1>
    <p class="text-[14px] text-outline mt-1">运维管理平台</p>
  </section>
  <form id="login-form" class="flex flex-col gap-5">
    <div class="flex flex-col gap-1.5">
      <label class="text-[13px] text-on-surface-variant font-medium" for="employee-id">工号</label>
      <input class="h-10 px-3 bg-surface-container-lowest border border-outline-variant/30 rounded-xl text-[14px] focus:ring-2 focus:ring-secondary/20 focus:border-secondary outline-none transition-all placeholder:text-outline-variant" id="employee-id" placeholder="请输入工号" type="text" autocomplete="username"/>
    </div>
    <div class="flex flex-col gap-1.5">
      <label class="text-[13px] text-on-surface-variant font-medium" for="password">密码</label>
      <div class="relative">
        <input class="w-full h-10 px-3 pr-10 bg-surface-container-lowest border border-outline-variant/30 rounded-xl text-[14px] focus:ring-2 focus:ring-secondary/20 focus:border-secondary outline-none transition-all placeholder:text-outline-variant" id="password" placeholder="请输入密码" type="password" autocomplete="current-password"/>
        <button class="absolute right-3 top-1/2 -translate-y-1/2 text-outline-variant hover:text-on-surface-variant transition-colors" id="toggle-pw" type="button">
          <span class="material-symbols-outlined text-[20px]" id="pw-icon">visibility</span>
        </button>
      </div>
    </div>
    <div id="error-msg" class="hidden text-[13px] text-red-600 bg-red-50 px-3 py-2 rounded-lg"></div>
    <button class="w-full h-10 bg-[#1A1A1A] hover:bg-on-background text-white text-[14px] font-medium rounded-xl transition-all active:scale-[0.98] shadow-sm flex items-center justify-center gap-2" id="submit-btn" type="submit">
      <span id="btn-text">登录</span>
    </button>
  </form>
  <footer class="text-center">
    <p class="text-[12px] text-outline">遇到问题请联系运维</p>
  </footer>
</main>
<div class="fixed inset-0 -z-10 overflow-hidden pointer-events-none">
  <div class="absolute top-[-10%] right-[-10%] w-[40%] h-[40%] bg-surface-container-low rounded-full blur-[120px] opacity-50"></div>
  <div class="absolute bottom-[-10%] left-[-10%] w-[40%] h-[40%] bg-surface-container-low rounded-full blur-[120px] opacity-50"></div>
</div>
<script src="api.js"></script>
<script>
  if (getToken()) window.location.href = 'dashboard.html';

  document.getElementById('toggle-pw').addEventListener('click', () => {
    const pw = document.getElementById('password');
    const icon = document.getElementById('pw-icon');
    if (pw.type === 'password') { pw.type = 'text'; icon.textContent = 'visibility_off'; }
    else { pw.type = 'password'; icon.textContent = 'visibility'; }
  });

  document.getElementById('login-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const username = document.getElementById('employee-id').value.trim();
    const password = document.getElementById('password').value;
    const errEl = document.getElementById('error-msg');
    const btnText = document.getElementById('btn-text');
    const btn = document.getElementById('submit-btn');

    if (!username || !password) {
      errEl.textContent = '请输入工号和密码';
      errEl.classList.remove('hidden');
      return;
    }
    btn.disabled = true;
    btnText.textContent = '登录中...';
    errEl.classList.add('hidden');

    try {
      const res = await login(username, password);
      const d = res.data;
      localStorage.setItem('ow_token', d.access_token);
      localStorage.setItem('ow_user', JSON.stringify({ id: d.user_id, username: d.username, name: d.name, role: d.role }));
      window.location.href = 'dashboard.html';
    } catch (err) {
      errEl.textContent = err.message || '登录失败，请检查工号和密码';
      errEl.classList.remove('hidden');
      btn.disabled = false;
      btnText.textContent = '登录';
    }
  });
</script>
</body></html>
