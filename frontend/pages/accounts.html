<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>账号管理 - OpsWarden</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script id="tailwind-config">
  tailwind.config = {
    darkMode: "class",
    theme: {
      extend: {
        colors: {
          "on-primary-container": "#525151", "surface-variant": "#dbe4e7", "outline": "#737c7f",
          "surface-tint": "#5f5e5e", "secondary": "#0053dc", "on-secondary-fixed": "#003798",
          "on-error-container": "#752121", "surface-container-low": "#f1f4f6",
          "surface-container-highest": "#dbe4e7", "on-error": "#fff7f6", "surface-dim": "#d1dce0",
          "background": "#f8f9fa", "surface": "#f8f9fa", "secondary-container": "#dbe1ff",
          "on-secondary-fixed-variant": "#0050d4", "surface-container-high": "#e3e9ec",
          "on-background": "#2b3437", "error-container": "#fe8983", "secondary-dim": "#0049c2",
          "primary": "#5f5e5e", "error": "#9f403d", "on-secondary-container": "#0048bf",
          "tertiary-fixed": "#82ff99", "on-surface": "#2b3437", "surface-bright": "#f8f9fa",
          "on-secondary": "#faf8ff", "primary-container": "#e5e2e1", "inverse-primary": "#ffffff",
          "tertiary-container": "#82ff99", "tertiary-dim": "#006127", "on-surface-variant": "#586064",
          "on-tertiary": "#e9ffe6", "surface-container": "#eaeff1", "tertiary": "#006e2e",
          "on-tertiary-container": "#006127", "outline-variant": "#abb3b7",
          "inverse-surface": "#0c0f10", "on-primary": "#faf7f6", "surface-container-lowest": "#ffffff",
          "primary-dim": "#535252",
        },
        fontFamily: { "headline": ["Inter"], "body": ["Inter"], "label": ["Inter"] },
        borderRadius: { "DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "9999px" },
      },
    },
  }
</script>
<style>
  .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; vertical-align: middle; }
  body { font-family: 'Inter', system-ui, sans-serif; }
</style>
</head>
<body class="bg-background text-on-surface flex min-h-screen overflow-hidden">

<!-- Sidebar -->
<aside class="w-[200px] h-full fixed left-0 top-0 bg-[#F1F4F6] flex flex-col justify-between py-4 z-50">
  <div>
    <div class="px-6 mb-8 flex items-center gap-2">
      <div class="w-6 h-6 bg-primary rounded-lg flex items-center justify-center">
        <span class="material-symbols-outlined text-[14px] text-white">security</span>
      </div>
      <span class="text-[14px] font-medium text-[#2B3437]">OpsWarden</span>
    </div>
    <nav class="flex flex-col gap-1 px-2">
      <a class="flex items-center gap-3 px-4 py-2.5 rounded text-[#5F5E5E] hover:bg-[#DBE4E7] transition-colors text-[14px] font-medium tracking-tight" href="#">
        <span class="material-symbols-outlined">dashboard</span>仪表盘
      </a>
      <a class="flex items-center gap-3 px-4 py-2.5 rounded text-[#5F5E5E] hover:bg-[#DBE4E7] transition-colors text-[14px] font-medium tracking-tight" href="#">
        <span class="material-symbols-outlined">smart_toy</span>AI 问答
      </a>
      <a class="flex items-center gap-3 px-4 py-2.5 bg-[#F0F4FF] text-[#2563EB] border-l-2 border-[#2563EB] text-[14px] font-medium tracking-tight" href="#">
        <span class="material-symbols-outlined">manage_accounts</span>账号管理
      </a>
      <a class="flex items-center gap-3 px-4 py-2.5 rounded text-[#5F5E5E] hover:bg-[#DBE4E7] transition-colors text-[14px] font-medium tracking-tight" href="#">
        <span class="material-symbols-outlined">confirmation_number</span>工单系统
      </a>
      <a class="flex items-center gap-3 px-4 py-2.5 rounded text-[#5F5E5E] hover:bg-[#DBE4E7] transition-colors text-[14px] font-medium tracking-tight" href="#">
        <span class="material-symbols-outlined">auto_stories</span>知识库
      </a>
    </nav>
  </div>
  <div class="px-2">
    <a class="flex items-center gap-3 px-4 py-2.5 rounded text-[#5F5E5E] hover:bg-[#DBE4E7] transition-colors text-[14px] font-medium tracking-tight" href="#">
      <span class="material-symbols-outlined">logout</span>退出登录
    </a>
  </div>
</aside>

<!-- Main -->
<main class="ml-[200px] flex-1 flex flex-col relative overflow-y-auto">
  <!-- Top Bar -->
  <header class="h-[52px] fixed top-0 right-0 left-[200px] bg-white/80 backdrop-blur-md z-40 border-b border-[#ABB3B7]/15 flex justify-between items-center px-6">
    <span class="text-[15px] font-medium text-[#1A1A1A]">OpsWarden</span>
    <div class="flex items-center gap-4">
      <button class="text-[#5F5E5E] hover:bg-slate-100 rounded-full p-2 transition-opacity">
        <span class="material-symbols-outlined">notifications</span>
      </button>
    </div>
  </header>

  <!-- Content -->
  <div class="mt-[52px] p-8 max-w-[1200px] mx-auto w-full">
    <!-- Page Header -->
    <div class="flex justify-between items-end mb-8">
      <div>
        <h1 class="text-[24px] font-medium text-on-surface leading-tight">账号管理</h1>
        <p id="account-count" class="text-[14px] text-on-surface-variant mt-1">加载中...</p>
      </div>
      <button id="new-account-btn" class="bg-[#1A1A1A] text-on-primary px-5 py-2.5 rounded-lg text-[14px] font-medium inline-flex items-center gap-2 hover:bg-primary-dim transition-all">
        <span class="material-symbols-outlined text-[18px]">add</span>新建账号
      </button>
    </div>

    <!-- Filter Row -->
    <div class="flex flex-wrap items-center gap-4 mb-6">
      <div class="relative w-[240px]">
        <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline text-[18px]">search</span>
        <input id="search-input" class="w-full pl-10 pr-4 py-2 bg-surface-container-lowest border border-outline-variant/30 rounded-lg text-[14px] focus:outline-none focus:border-secondary transition-colors" placeholder="搜索账号或姓名..." type="text"/>
      </div>
      <select id="filter-status" class="pl-4 pr-10 py-2 bg-surface-container-lowest border border-outline-variant/30 rounded-lg text-[14px] appearance-none focus:outline-none focus:border-secondary transition-colors">
        <option value="">所有状态</option>
        <option value="active">正常</option>
        <option value="frozen">冻结</option>
      </select>
      <button id="reset-btn" class="px-4 py-2 text-on-surface-variant text-[14px] font-medium hover:text-on-surface transition-colors">重置</button>
    </div>

    <!-- Table -->
    <div class="bg-surface-container-lowest rounded-xl shadow-[0_20px_40px_rgba(43,52,55,0.06)] overflow-hidden">
      <table class="w-full text-left border-collapse">
        <thead>
          <tr class="bg-surface-container-low/50">
            <th class="px-6 py-4 text-[12px] font-semibold text-on-surface-variant uppercase tracking-wider">工号</th>
            <th class="px-6 py-4 text-[12px] font-semibold text-on-surface-variant uppercase tracking-wider">姓名</th>
            <th class="px-6 py-4 text-[12px] font-semibold text-on-surface-variant uppercase tracking-wider">用户名</th>
            <th class="px-6 py-4 text-[12px] font-semibold text-on-surface-variant uppercase tracking-wider">角色</th>
            <th class="px-6 py-4 text-[12px] font-semibold text-on-surface-variant uppercase tracking-wider">部门</th>
            <th class="px-6 py-4 text-[12px] font-semibold text-on-surface-variant uppercase tracking-wider">状态</th>
            <th class="px-6 py-4 text-[12px] font-semibold text-on-surface-variant uppercase tracking-wider">最后登录</th>
            <th class="px-6 py-4 text-[12px] font-semibold text-on-surface-variant uppercase tracking-wider text-right">操作</th>
          </tr>
        </thead>
        <tbody id="accounts-tbody" class="divide-y divide-outline-variant/10">
          <tr><td colspan="8" class="px-6 py-8 text-center text-[14px] text-on-surface-variant">加载中...</td></tr>
        </tbody>
      </table>
      <!-- Pagination -->
      <div class="px-6 py-4 bg-surface-container-low/30 flex justify-between items-center border-t border-outline-variant/10">
        <span id="page-info" class="text-[13px] text-on-surface-variant">-</span>
        <div class="flex gap-2 items-center">
          <button id="prev-btn" class="p-1 rounded hover:bg-surface-container-highest transition-colors disabled:opacity-30" disabled>
            <span class="material-symbols-outlined">chevron_left</span>
          </button>
          <span id="page-num" class="text-[13px] text-on-surface-variant px-1">1</span>
          <button id="next-btn" class="p-1 rounded hover:bg-surface-container-highest transition-colors disabled:opacity-30" disabled>
            <span class="material-symbols-outlined">chevron_right</span>
          </button>
        </div>
      </div>
    </div>
  </div>
</main>

<!-- Slide Panel Overlay -->
<div id="account-panel" class="hidden fixed inset-0 bg-on-surface/20 backdrop-blur-sm z-[60] flex justify-end">
  <div class="w-full max-w-[480px] h-full bg-surface-container-lowest shadow-2xl flex flex-col">
    <div class="px-8 py-6 border-b border-outline-variant/15 flex justify-between items-center">
      <h2 id="panel-title" class="text-[20px] font-medium text-on-surface">新建账号</h2>
      <button id="close-panel-btn" class="p-2 rounded-full hover:bg-surface-container-high transition-colors">
        <span class="material-symbols-outlined">close</span>
      </button>
    </div>
    <div class="flex-1 overflow-y-auto px-8 py-8 space-y-5">
      <input type="hidden" id="edit-account-id"/>
      <!-- 工号 -->
      <div class="space-y-1.5">
        <label class="block text-[14px] font-medium text-on-surface">工号 <span class="text-error" id="employee-id-required">*</span></label>
        <input id="f-employee-id" class="w-full px-4 py-2.5 bg-surface-container-low border border-outline-variant/20 rounded-lg text-[14px] focus:ring-1 focus:ring-secondary focus:border-secondary outline-none" placeholder="如：EMP001" type="text"/>
      </div>
      <!-- 用户名 -->
      <div class="space-y-1.5" id="username-field">
        <label class="block text-[14px] font-medium text-on-surface">用户名 <span class="text-error">*</span></label>
        <input id="f-username" class="w-full px-4 py-2.5 bg-surface-container-low border border-outline-variant/20 rounded-lg text-[14px] focus:ring-1 focus:ring-secondary focus:border-secondary outline-none" placeholder="登录账号" type="text"/>
      </div>
      <!-- 姓名 -->
      <div class="space-y-1.5">
        <label class="block text-[14px] font-medium text-on-surface">姓名 <span class="text-error">*</span></label>
        <input id="f-name" class="w-full px-4 py-2.5 bg-surface-container-lowest border border-outline-variant/50 rounded-lg text-[14px] focus:ring-1 focus:ring-secondary focus:border-secondary outline-none" placeholder="真实姓名" type="text"/>
      </div>
      <!-- 密码 -->
      <div class="space-y-1.5">
        <label class="block text-[14px] font-medium text-on-surface">密码 <span class="text-error" id="password-required">*</span><span id="password-hint" class="text-[12px] text-on-surface-variant font-normal hidden">（不填则不修改）</span></label>
        <input id="f-password" class="w-full px-4 py-2.5 bg-surface-container-lowest border border-outline-variant/50 rounded-lg text-[14px] focus:ring-1 focus:ring-secondary focus:border-secondary outline-none" placeholder="登录密码" type="password"/>
      </div>
      <!-- 部门 -->
      <div class="space-y-1.5">
        <label class="block text-[14px] font-medium text-on-surface">部门</label>
        <input id="f-department" class="w-full px-4 py-2.5 bg-surface-container-lowest border border-outline-variant/50 rounded-lg text-[14px] focus:ring-1 focus:ring-secondary focus:border-secondary outline-none" placeholder="所属部门" type="text"/>
      </div>
      <!-- 邮箱 -->
      <div class="space-y-1.5">
        <label class="block text-[14px] font-medium text-on-surface">邮箱</label>
        <input id="f-email" class="w-full px-4 py-2.5 bg-surface-container-lowest border border-outline-variant/50 rounded-lg text-[14px] focus:ring-1 focus:ring-secondary focus:border-secondary outline-none" placeholder="example@company.com" type="email"/>
      </div>
      <!-- 手机 -->
      <div class="space-y-1.5">
        <label class="block text-[14px] font-medium text-on-surface">手机号</label>
        <input id="f-phone" class="w-full px-4 py-2.5 bg-surface-container-lowest border border-outline-variant/50 rounded-lg text-[14px] focus:ring-1 focus:ring-secondary focus:border-secondary outline-none" placeholder="11位手机号码" type="tel"/>
      </div>
      <!-- 角色 -->
      <div class="space-y-3 pt-1">
        <label class="block text-[14px] font-medium text-on-surface">角色权限</label>
        <div class="flex flex-col gap-2">
          <label class="flex items-center gap-3 p-3 border border-outline-variant/30 rounded-xl cursor-pointer hover:bg-surface-container-low transition-colors">
            <input class="text-secondary focus:ring-secondary" name="role" type="radio" value="admin"/>
            <div>
              <p class="text-[14px] font-medium text-on-surface">管理员</p>
              <p class="text-[12px] text-on-surface-variant">拥有系统完全控制权限</p>
            </div>
          </label>
          <label class="flex items-center gap-3 p-3 border border-outline-variant/30 rounded-xl cursor-pointer hover:bg-surface-container-low transition-colors">
            <input class="text-secondary focus:ring-secondary" name="role" type="radio" value="operator"/>
            <div>
              <p class="text-[14px] font-medium text-on-surface">运维员</p>
              <p class="text-[12px] text-on-surface-variant">处理工单、管理知识库</p>
            </div>
          </label>
          <label class="flex items-center gap-3 p-3 border border-secondary/50 bg-secondary/5 rounded-xl cursor-pointer">
            <input class="text-secondary focus:ring-secondary" name="role" type="radio" value="user" checked/>
            <div>
              <p class="text-[14px] font-medium text-on-surface">普通用户</p>
              <p class="text-[12px] text-on-surface-variant">查看与基础操作权限</p>
            </div>
          </label>
        </div>
      </div>
      <div id="panel-error" class="hidden text-[13px] text-error pt-1"></div>
    </div>
    <div class="px-8 py-6 border-t border-outline-variant/15 flex gap-4">
      <button id="panel-cancel-btn" class="flex-1 px-6 py-2.5 border border-outline-variant rounded-lg text-[14px] font-medium text-on-surface-variant hover:bg-surface-container-low transition-colors">取消</button>
      <button id="panel-save" class="flex-1 px-6 py-2.5 bg-[#1A1A1A] text-on-primary rounded-lg text-[14px] font-medium hover:bg-primary-dim transition-all">创建账号</button>
    </div>
  </div>
</div>

<script src="api.js"></script>
<script>
  requireAuth();
  bindSidebar();

  let currentPage = 1;
  const pageSize = 10;
  let editId = null;
  let searchTimer = null;

  // 工具函数
  function roleBadge(role) {
    const r = ACCOUNT_ROLE[role] || { label: role, cls: 'bg-slate-50 text-slate-600' };
    return `<span class="px-2.5 py-0.5 rounded-full text-[12px] font-medium ${r.cls}">${r.label}</span>`;
  }

  function statusBadge(status) {
    const s = ACCOUNT_STATUS[status] || { label: status, cls: 'bg-slate-100 text-slate-500', dotCls: 'bg-slate-400' };
    return `<span class="inline-flex items-center gap-1.5 px-2.5 py-0.5 rounded-full text-[12px] font-medium ${s.cls}">
      <span class="w-1.5 h-1.5 rounded-full ${s.dotCls}"></span>${s.label}
    </span>`;
  }

  function freezeBtn(a) {
    if (a.status === 'active') {
      return `<button onclick="doFreeze(${a.id})" class="text-amber-600 hover:underline text-[13px] font-medium">冻结</button>`;
    }
    return `<button onclick="doUnfreeze(${a.id})" class="text-secondary hover:underline text-[13px] font-medium">解冻</button>`;
  }

  // 加载列表
  async function loadAccounts(page) {
    currentPage = page;
    const keyword = document.getElementById('search-input').value.trim();
    const status = document.getElementById('filter-status').value;
    const params = { page: currentPage, page_size: pageSize };
    if (keyword) params.keyword = keyword;
    if (status) params.status = status;

    try {
      const res = await getAccounts(params);
      const d = res.data;
      document.getElementById('account-count').textContent = `共 ${d.total} 个账号`;
      const start = (currentPage - 1) * pageSize + 1;
      const end = Math.min(currentPage * pageSize, d.total);
      document.getElementById('page-info').textContent = d.total ? `显示 ${start}–${end} 条，共 ${d.total} 条` : '暂无账号';
      document.getElementById('page-num').textContent = currentPage;
      document.getElementById('prev-btn').disabled = currentPage <= 1;
      document.getElementById('next-btn').disabled = currentPage * pageSize >= d.total;

      const tbody = document.getElementById('accounts-tbody');
      if (!d.items.length) {
        tbody.innerHTML = '<tr><td colspan="8" class="px-6 py-8 text-center text-[14px] text-on-surface-variant">暂无账号</td></tr>';
        return;
      }
      tbody.innerHTML = d.items.map(a => `
        <tr class="hover:bg-surface-container-highest/30 transition-colors" data-id="${a.id}">
          <td class="px-6 py-4 text-[14px] text-on-surface font-medium">${escHtml(a.employee_id)}</td>
          <td class="px-6 py-4 text-[14px] text-on-surface">${escHtml(a.name)}</td>
          <td class="px-6 py-4 text-[14px] text-on-surface-variant">${escHtml(a.username)}</td>
          <td class="px-6 py-4">${roleBadge(a.role)}</td>
          <td class="px-6 py-4 text-[14px] text-on-surface-variant">${escHtml(a.department || '—')}</td>
          <td class="px-6 py-4">${statusBadge(a.status)}</td>
          <td class="px-6 py-4 text-[14px] text-on-surface-variant">${a.last_login_at ? fmtDate(a.last_login_at) : '从未登录'}</td>
          <td class="px-6 py-4 text-right flex gap-3 justify-end items-center">
            <button onclick='openPanel(${JSON.stringify(a)})' class="text-secondary hover:underline text-[13px] font-medium">编辑</button>
            ${freezeBtn(a)}
          </td>
        </tr>`).join('');
    } catch (e) {
      document.getElementById('accounts-tbody').innerHTML = `<tr><td colspan="8" class="px-6 py-8 text-center text-[13px] text-error">${e.message}</td></tr>`;
    }
  }

  // 搜索 / 过滤
  document.getElementById('search-input').addEventListener('input', () => {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(() => loadAccounts(1), 400);
  });
  document.getElementById('filter-status').addEventListener('change', () => loadAccounts(1));
  document.getElementById('reset-btn').addEventListener('click', () => {
    document.getElementById('search-input').value = '';
    document.getElementById('filter-status').value = '';
    loadAccounts(1);
  });
  document.getElementById('prev-btn').addEventListener('click', () => loadAccounts(currentPage - 1));
  document.getElementById('next-btn').addEventListener('click', () => loadAccounts(currentPage + 1));

  // 冻结 / 解冻
  async function doFreeze(id) {
    try { await freezeAccount(id); loadAccounts(currentPage); } catch (e) { alert(e.message); }
  }
  async function doUnfreeze(id) {
    try { await unfreezeAccount(id); loadAccounts(currentPage); } catch (e) { alert(e.message); }
  }

  // Slide Panel
  const panel = document.getElementById('account-panel');

  function openPanel(account) {
    editId = account ? account.id : null;
    document.getElementById('panel-error').classList.add('hidden');
    document.getElementById('panel-title').textContent = account ? '编辑账号' : '新建账号';
    document.getElementById('panel-save').textContent = account ? '保存更改' : '创建账号';

    // 工号：编辑时只读
    const empField = document.getElementById('f-employee-id');
    empField.value = account ? account.employee_id : '';
    empField.readOnly = !!account;
    empField.className = `w-full px-4 py-2.5 border rounded-lg text-[14px] outline-none focus:ring-1 focus:ring-secondary focus:border-secondary ${account ? 'bg-surface-container-low border-outline-variant/20 cursor-default' : 'bg-surface-container-low border-outline-variant/20'}`;
    document.getElementById('employee-id-required').style.display = account ? 'none' : '';

    // 用户名：编辑时只读
    document.getElementById('f-username').value = account ? account.username : '';
    document.getElementById('f-username').readOnly = !!account;
    document.getElementById('username-field').querySelector('span.text-error').style.display = account ? 'none' : '';

    document.getElementById('f-name').value = account ? account.name : '';
    document.getElementById('f-password').value = '';
    document.getElementById('password-required').style.display = account ? 'none' : '';
    document.getElementById('password-hint').classList.toggle('hidden', !account);

    document.getElementById('f-department').value = account ? (account.department || '') : '';
    document.getElementById('f-email').value = account ? (account.email || '') : '';
    document.getElementById('f-phone').value = account ? (account.phone || '') : '';

    const roleVal = account ? account.role : 'user';
    const radio = document.querySelector(`input[name="role"][value="${roleVal}"]`);
    if (radio) radio.checked = true;

    panel.classList.remove('hidden');
  }

  function closePanel() { panel.classList.add('hidden'); editId = null; }

  document.getElementById('new-account-btn').addEventListener('click', () => openPanel(null));
  document.getElementById('close-panel-btn').addEventListener('click', closePanel);
  document.getElementById('panel-cancel-btn').addEventListener('click', closePanel);

  document.getElementById('panel-save').addEventListener('click', async () => {
    const errEl = document.getElementById('panel-error');
    const employee_id = document.getElementById('f-employee-id').value.trim();
    const username = document.getElementById('f-username').value.trim();
    const name = document.getElementById('f-name').value.trim();
    const password = document.getElementById('f-password').value;
    const department = document.getElementById('f-department').value.trim();
    const email = document.getElementById('f-email').value.trim();
    const phone = document.getElementById('f-phone').value.trim();
    const role = document.querySelector('input[name="role"]:checked')?.value || 'user';

    try {
      document.getElementById('panel-save').disabled = true;
      if (editId) {
        if (!name) { errEl.textContent = '请填写姓名'; errEl.classList.remove('hidden'); return; }
        const data = { name, department, email, phone, role };
        if (password) data.password = password;
        await updateAccount(editId, data);
      } else {
        if (!employee_id || !username || !name || !password) {
          errEl.textContent = '请填写工号、用户名、姓名和密码';
          errEl.classList.remove('hidden');
          return;
        }
        await createAccount({ employee_id, username, password, name, department, email, phone, role });
      }
      closePanel();
      loadAccounts(editId ? currentPage : 1);
    } catch (e) {
      errEl.textContent = e.message;
      errEl.classList.remove('hidden');
    } finally {
      document.getElementById('panel-save').disabled = false;
    }
  });

  function escHtml(s) {
    return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }

  loadAccounts(1);
</script>
</body>
</html>
