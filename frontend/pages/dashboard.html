<!DOCTYPE html>
<html lang="zh-Hans"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>仪表盘 - OpsWarden</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "on-primary-container": "#525151","surface-variant": "#dbe4e7","outline": "#737c7f",
            "surface-tint": "#5f5e5e","secondary": "#0053dc","on-secondary-fixed": "#003798",
            "on-error-container": "#752121","surface-container-low": "#f1f4f6",
            "surface-container-highest": "#dbe4e7","on-error": "#fff7f6","surface-dim": "#d1dce0",
            "background": "#f8f9fa","surface": "#f8f9fa","secondary-container": "#dbe1ff",
            "on-secondary-fixed-variant": "#0050d4","surface-container-high": "#e3e9ec",
            "on-background": "#2b3437","error-container": "#fe8983","secondary-dim": "#0049c2",
            "primary": "#5f5e5e","error": "#9f403d","on-secondary-container": "#0048bf",
            "tertiary-fixed": "#82ff99","on-surface": "#2b3437","surface-bright": "#f8f9fa",
            "on-secondary": "#faf8ff","primary-container": "#e5e2e1","inverse-primary": "#ffffff",
            "tertiary-container": "#82ff99","tertiary-dim": "#006127","on-surface-variant": "#586064",
            "on-tertiary": "#e9ffe6","surface-container": "#eaeff1","tertiary": "#006e2e",
            "on-tertiary-container": "#006127","outline-variant": "#abb3b7",
            "inverse-surface": "#0c0f10","on-primary": "#faf7f6","surface-container-lowest": "#ffffff"
          },
          fontFamily: { "headline": ["Inter"], "body": ["Inter"], "label": ["Inter"] },
          borderRadius: {"DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem"},
        },
      },
    }
  </script>
<style>
    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; display: inline-block; line-height: 1; text-transform: none; letter-spacing: normal; word-wrap: normal; white-space: nowrap; direction: ltr; }
    body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #f8f9fa; color: #2b3437; }
  </style>
</head>
<body class="bg-background text-on-surface flex min-h-screen">
<aside class="w-[200px] h-screen fixed left-0 top-0 bg-[#F1F4F6] flex flex-col justify-between py-4 z-50">
<div class="flex flex-col gap-6">
<div class="px-6 py-2">
<span class="text-[14px] font-medium text-[#2B3437] tracking-tight">OpsWarden</span>
</div>
<nav class="flex flex-col gap-1">
<a class="flex items-center gap-3 px-6 py-2.5 bg-[#F0F4FF] text-[#2563EB] border-l-2 border-[#2563EB] font-['Inter'] text-[14px] font-medium tracking-tight" href="#">
<span class="material-symbols-outlined text-[20px]">dashboard</span><span>仪表盘</span>
</a>
<a class="flex items-center gap-3 px-6 py-2.5 text-[#5F5E5E] hover:bg-[#DBE4E7] font-['Inter'] text-[14px] font-medium tracking-tight transition-colors" href="#">
<span class="material-symbols-outlined text-[20px]">smart_toy</span><span>AI 问答</span>
</a>
<a class="flex items-center gap-3 px-6 py-2.5 text-[#5F5E5E] hover:bg-[#DBE4E7] font-['Inter'] text-[14px] font-medium tracking-tight transition-colors" href="#">
<span class="material-symbols-outlined text-[20px]">manage_accounts</span><span>账号管理</span>
</a>
<a class="flex items-center gap-3 px-6 py-2.5 text-[#5F5E5E] hover:bg-[#DBE4E7] font-['Inter'] text-[14px] font-medium tracking-tight transition-colors" href="#">
<span class="material-symbols-outlined text-[20px]">confirmation_number</span><span>工单系统</span>
</a>
<a class="flex items-center gap-3 px-6 py-2.5 text-[#5F5E5E] hover:bg-[#DBE4E7] font-['Inter'] text-[14px] font-medium tracking-tight transition-colors" href="#">
<span class="material-symbols-outlined text-[20px]">auto_stories</span><span>知识库</span>
</a>
</nav>
</div>
<div class="px-2">
<a class="flex items-center gap-3 px-4 py-2 text-[#5F5E5E] hover:bg-[#DBE4E7] rounded-lg transition-colors" href="#">
<span class="material-symbols-outlined text-[20px]">logout</span>
<span class="text-[14px] font-medium">退出登录</span>
</a>
</div>
</aside>
<div class="flex-1 ml-[200px] flex flex-col min-h-screen">
<header class="h-[52px] fixed top-0 right-0 left-[200px] z-40 bg-white/80 backdrop-blur-md border-b border-[#ABB3B7]/15 flex justify-between items-center px-6">
<h1 class="font-['Inter'] text-[15px] font-medium text-[#1A1A1A]">仪表盘</h1>
<div class="flex items-center gap-4">
<div class="flex items-center gap-2 pl-2 border-l border-outline-variant/20">
  <div class="w-8 h-8 rounded-full bg-secondary-container flex items-center justify-center text-secondary text-[13px] font-bold" id="user-avatar">A</div>
  <span class="text-[13px] text-on-surface" id="user-name">加载中...</span>
</div>
</div>
</header>
<main class="mt-[52px] p-6 flex flex-col gap-6">
<section class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
<div class="bg-surface-container-lowest p-5 rounded-xl shadow-[0_2px_8px_rgba(0,0,0,0.04)] border border-[#ABB3B7]/15 relative overflow-hidden">
<div class="absolute top-0 left-0 w-1 h-full bg-secondary"></div>
<p class="text-on-surface-variant text-[13px] font-medium mb-1">今日问答</p>
<div class="flex items-baseline gap-2">
<span class="text-2xl font-semibold text-on-surface tracking-tight" id="stat-daily-qa">-</span>
<span class="text-[12px] font-medium text-tertiary flex items-center">次</span>
</div>
</div>
<div class="bg-surface-container-lowest p-5 rounded-xl shadow-[0_2px_8px_rgba(0,0,0,0.04)] border border-[#ABB3B7]/15 relative overflow-hidden">
<div class="absolute top-0 left-0 w-1 h-full bg-error"></div>
<p class="text-on-surface-variant text-[13px] font-medium mb-1">待处理工单</p>
<div class="flex items-baseline gap-2">
<span class="text-2xl font-semibold text-on-surface tracking-tight" id="stat-pending">-</span>
<span class="px-2 py-0.5 bg-error-container text-on-error-container text-[11px] rounded-full font-medium hidden" id="stat-overdue-badge"></span>
</div>
</div>
<div class="bg-surface-container-lowest p-5 rounded-xl shadow-[0_2px_8px_rgba(0,0,0,0.04)] border border-[#ABB3B7]/15 relative overflow-hidden">
<div class="absolute top-0 left-0 w-1 h-full bg-primary"></div>
<p class="text-on-surface-variant text-[13px] font-medium mb-1">账号总数</p>
<div class="flex items-baseline gap-2">
<span class="text-2xl font-semibold text-on-surface tracking-tight" id="stat-accounts">-</span>
<span class="text-[12px] font-medium text-secondary" id="stat-accounts-new"></span>
</div>
</div>
<div class="bg-surface-container-lowest p-5 rounded-xl shadow-[0_2px_8px_rgba(0,0,0,0.04)] border border-[#ABB3B7]/15 relative overflow-hidden">
<div class="absolute top-0 left-0 w-1 h-full bg-tertiary"></div>
<p class="text-on-surface-variant text-[13px] font-medium mb-1">知识库条目</p>
<div class="flex items-baseline gap-2">
<span class="text-2xl font-semibold text-on-surface tracking-tight" id="stat-kb">-</span>
<span class="text-[12px] font-medium text-tertiary" id="stat-kb-new"></span>
</div>
</div>
</section>
<section class="bg-surface-container-lowest rounded-xl border border-[#ABB3B7]/15 overflow-hidden">
<div class="px-6 py-4 border-b border-[#ABB3B7]/15 flex justify-between items-center">
<h3 class="text-[15px] font-semibold text-on-surface">最近工单</h3>
<button class="text-secondary text-[13px] font-medium hover:underline" onclick="window.location.href='tickets.html'">查看全部</button>
</div>
<div class="overflow-x-auto">
<table class="w-full text-left border-collapse">
<thead>
<tr class="bg-surface-container-low/30">
<th class="px-6 py-3 text-[12px] font-medium text-on-surface-variant uppercase tracking-wider">编号</th>
<th class="px-6 py-3 text-[12px] font-medium text-on-surface-variant uppercase tracking-wider">摘要</th>
<th class="px-6 py-3 text-[12px] font-medium text-on-surface-variant uppercase tracking-wider">报障人</th>
<th class="px-6 py-3 text-[12px] font-medium text-on-surface-variant uppercase tracking-wider">状态</th>
<th class="px-6 py-3 text-[12px] font-medium text-on-surface-variant uppercase tracking-wider">时间</th>
</tr>
</thead>
<tbody id="recent-tickets-body" class="divide-y divide-[#ABB3B7]/10">
<tr><td colspan="5" class="px-6 py-8 text-center text-on-surface-variant text-[13px]">加载中...</td></tr>
</tbody>
</table>
</div>
</section>
</main>
</div>
<script src="api.js"></script>
<script>
  requireAuth();
  bindSidebar();

  // 显示用户信息
  const user = getUser();
  if (user) {
    document.getElementById('user-name').textContent = user.name || user.username;
    document.getElementById('user-avatar').textContent = (user.name || user.username || 'U')[0].toUpperCase();
  }

  // 加载统计数据
  getAnalyticsSummary().then(res => {
    const d = res.data;
    document.getElementById('stat-daily-qa').textContent = d.daily_qa;
    document.getElementById('stat-pending').textContent = d.pending_tickets;
    if (d.overdue_count > 0) {
      const badge = document.getElementById('stat-overdue-badge');
      badge.textContent = d.overdue_count + '个超时';
      badge.classList.remove('hidden');
    }
    document.getElementById('stat-accounts').textContent = d.total_accounts.toLocaleString();
    if (d.new_accounts_month > 0) document.getElementById('stat-accounts-new').textContent = '+' + d.new_accounts_month;
    document.getElementById('stat-kb').textContent = d.kb_entries;
    if (d.kb_new_week > 0) document.getElementById('stat-kb-new').textContent = '+' + d.kb_new_week;
  }).catch(() => {});

  // 加载最近工单
  getTickets({ page_size: 5 }).then(res => {
    const tickets = res.data.items;
    const tbody = document.getElementById('recent-tickets-body');
    if (!tickets.length) {
      tbody.innerHTML = '<tr><td colspan="5" class="px-6 py-8 text-center text-on-surface-variant text-[13px]">暂无工单</td></tr>';
      return;
    }
    tbody.innerHTML = tickets.map(t => {
      const st = TICKET_STATUS[t.status] || { label: t.status, cls: 'bg-slate-100 text-slate-600' };
      return `<tr class="hover:bg-surface-container-low/20 transition-colors cursor-pointer" onclick="window.location.href='tickets.html'">
        <td class="px-6 py-4 text-[13px] font-mono text-secondary">${t.ticket_no}</td>
        <td class="px-6 py-4 text-[13px] font-medium text-on-surface">${t.title}</td>
        <td class="px-6 py-4 text-[13px] text-on-surface-variant">${t.reporter_name || '-'}</td>
        <td class="px-6 py-4"><span class="px-2.5 py-0.5 rounded-full text-[11px] font-medium ${st.cls}">${st.label}</span></td>
        <td class="px-6 py-4 text-[13px] text-on-surface-variant">${fmtDate(t.created_at)}</td>
      </tr>`;
    }).join('');
  }).catch(() => {
    document.getElementById('recent-tickets-body').innerHTML = '<tr><td colspan="5" class="px-6 py-8 text-center text-on-surface-variant text-[13px]">加载失败</td></tr>';
  });
</script>
</body></html>
