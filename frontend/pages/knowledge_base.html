<!DOCTYPE html>
<html class="light" lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>知识库 - OpsWarden</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "on-primary-container": "#525151","surface-variant": "#dbe4e7","outline": "#737c7f",
              "surface-tint": "#5f5e5e","secondary": "#0053dc","on-secondary-fixed": "#003798",
              "on-error-container": "#752121","surface-container-low": "#f1f4f6",
              "surface-container-highest": "#dbe4e7","on-error": "#fff7f6","surface-dim": "#d1dce0",
              "background": "#f8f9fa","surface": "#f8f9fa","secondary-container": "#dbe1ff",
              "on-secondary-fixed-variant": "#0050d4","surface-container-high": "#e3e9ec",
              "on-background": "#2b3437","error-container": "#fe8983","secondary-dim": "#0049c2",
              "primary": "#5f5e5e","error": "#9f403d","on-secondary-container": "#0048bf",
              "tertiary-fixed": "#82ff99","on-surface": "#2b3437","surface-bright": "#f8f9fa",
              "on-secondary": "#faf8ff","primary-container": "#e5e2e1","inverse-primary": "#ffffff",
              "tertiary-container": "#82ff99","tertiary-dim": "#006127","on-surface-variant": "#586064",
              "on-tertiary": "#e9ffe6","surface-container": "#eaeff1","tertiary": "#006e2e",
              "on-tertiary-container": "#006127","outline-variant": "#abb3b7",
              "inverse-surface": "#0c0f10","on-primary": "#faf7f6","surface-container-lowest": "#ffffff"
            },
            fontFamily: { "headline": ["Inter"], "body": ["Inter"], "label": ["Inter"] },
            borderRadius: {"DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem"},
          },
        },
      }
    </script>
<style>
      .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
      body { font-family: 'Inter', system-ui, -apple-system, sans-serif; }
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-background text-on-background">
<aside class="w-[200px] h-screen fixed left-0 top-0 bg-[#F1F4F6] flex flex-col py-4 justify-between z-50">
<div>
<div class="px-6 mb-8">
<span class="text-[14px] font-medium text-[#2B3437] tracking-tight">OpsWarden</span>
</div>
<nav class="space-y-1">
<a class="flex items-center px-6 py-2.5 text-[#5F5E5E] hover:bg-[#DBE4E7] transition-colors font-['Inter'] text-[14px] font-medium tracking-tight" href="#">
<span class="material-symbols-outlined mr-3 text-[20px]">dashboard</span>仪表盘
</a>
<a class="flex items-center px-6 py-2.5 text-[#5F5E5E] hover:bg-[#DBE4E7] transition-colors font-['Inter'] text-[14px] font-medium tracking-tight" href="#">
<span class="material-symbols-outlined mr-3 text-[20px]">smart_toy</span>AI 问答
</a>
<a class="flex items-center px-6 py-2.5 text-[#5F5E5E] hover:bg-[#DBE4E7] transition-colors font-['Inter'] text-[14px] font-medium tracking-tight" href="#">
<span class="material-symbols-outlined mr-3 text-[20px]">manage_accounts</span>账号管理
</a>
<a class="flex items-center px-6 py-2.5 text-[#5F5E5E] hover:bg-[#DBE4E7] transition-colors font-['Inter'] text-[14px] font-medium tracking-tight" href="#">
<span class="material-symbols-outlined mr-3 text-[20px]">confirmation_number</span>工单系统
</a>
<a class="flex items-center px-6 py-2.5 bg-[#F0F4FF] text-[#2563EB] border-l-2 border-[#2563EB] font-['Inter'] text-[14px] font-medium tracking-tight" href="#">
<span class="material-symbols-outlined mr-3 text-[20px]">auto_stories</span>知识库
</a>
</nav>
</div>
<div class="px-6">
<a class="flex items-center py-2.5 text-[#5F5E5E] hover:bg-[#DBE4E7] transition-colors font-['Inter'] text-[14px] font-medium" href="#">
<span class="material-symbols-outlined mr-3 text-[20px]">logout</span>退出登录
</a>
</div>
</aside>
<header class="h-[52px] fixed top-0 right-0 left-[200px] z-40 bg-white/80 backdrop-blur-md flex justify-between items-center px-6 border-b border-[#ABB3B7]/15">
<h1 class="font-['Inter'] text-[15px] font-medium text-[#1A1A1A]">知识库管理</h1>
</header>
<main class="ml-[200px] pt-[52px] min-h-screen">
<div class="p-8 max-w-7xl mx-auto">
<div class="flex justify-between items-end mb-8">
<div>
<div class="flex items-baseline gap-3">
<h2 class="text-2xl font-medium text-on-background">知识库</h2>
<span id="kb-total-count" class="text-on-surface-variant text-sm">- 条</span>
</div>
<p class="text-on-surface-variant text-sm mt-1">管理和优化 AI 问答引擎的基础知识储备</p>
</div>
<button id="new-entry-btn" class="bg-[#1A1A1A] text-white px-5 py-2.5 rounded-lg flex items-center gap-2 text-sm font-medium hover:bg-black transition-all">
<span class="material-symbols-outlined text-[18px]">add</span>新增条目
</button>
</div>
<div class="grid grid-cols-3 gap-6 mb-8">
<div class="bg-surface-container-low p-5 rounded-xl">
<p class="text-on-surface-variant text-xs mb-2">本周新增</p>
<div class="flex items-baseline gap-2">
<span id="stat-new-week" class="text-2xl font-semibold">-</span>
<span class="text-tertiary text-xs font-medium">条</span>
</div>
</div>
<div class="bg-surface-container-low p-5 rounded-xl">
<p class="text-on-surface-variant text-xs mb-2">工单回写</p>
<div class="flex items-baseline gap-2">
<span id="stat-writeback" class="text-2xl font-semibold">-</span>
<span class="text-on-surface-variant text-xs">条</span>
</div>
</div>
<div class="bg-surface-container-low p-5 rounded-xl">
<p class="text-on-surface-variant text-xs mb-2">平均匹配分</p>
<div class="flex items-baseline gap-2">
<span id="stat-avg-score" class="text-2xl font-semibold">-</span>
</div>
</div>
</div>
<div class="flex flex-col gap-6 mb-8">
<div class="flex items-center gap-6 border-b border-outline-variant/15" id="cat-tabs">
<button class="cat-tab pb-3 text-sm font-medium border-b-2 border-secondary text-secondary" data-cat="">全部条目</button>
<button class="cat-tab pb-3 text-sm font-medium text-on-surface-variant hover:text-on-surface transition-colors border-b-2 border-transparent" data-cat="基础架构">基础架构</button>
<button class="cat-tab pb-3 text-sm font-medium text-on-surface-variant hover:text-on-surface transition-colors border-b-2 border-transparent" data-cat="网络安全">网络安全</button>
<button class="cat-tab pb-3 text-sm font-medium text-on-surface-variant hover:text-on-surface transition-colors border-b-2 border-transparent" data-cat="数据库">数据库</button>
<button class="cat-tab pb-3 text-sm font-medium text-on-surface-variant hover:text-on-surface transition-colors border-b-2 border-transparent" data-cat="中间件">中间件</button>
</div>
<div class="flex gap-4">
<div class="flex-1 relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant text-[18px]">search</span>
<input id="kb-search" class="w-full bg-surface-container-lowest border border-outline-variant/30 rounded-lg pl-10 pr-4 py-2 text-sm focus:outline-none focus:border-secondary transition-colors" placeholder="搜索问题或关键字..." type="text"/>
</div>
<select id="kb-source-filter" class="bg-surface-container-lowest border border-outline-variant/30 rounded-lg px-4 py-2 text-sm focus:outline-none">
<option value="">所有来源</option>
<option value="manual">人工录入</option>
<option value="ticket_writeback">工单回写</option>
</select>
</div>
</div>
<div id="kb-grid" class="grid grid-cols-1 lg:grid-cols-2 gap-6">
<div class="col-span-2 text-center text-on-surface-variant text-sm py-12">加载中...</div>
</div>
</div>
</main>

<!-- Add/Edit Panel -->
<div id="kb-panel" class="hidden fixed inset-y-0 right-0 w-[480px] bg-surface-container-lowest z-[60] flex flex-col shadow-2xl ring-1 ring-outline-variant/20">
<div class="h-[52px] px-6 border-b border-outline-variant/15 flex items-center justify-between">
<h3 id="panel-title" class="font-medium text-sm">新增知识库条目</h3>
<button id="panel-close" class="p-1 hover:bg-surface-container-high rounded-full transition-colors">
<span class="material-symbols-outlined text-[20px]">close</span>
</button>
</div>
<div class="flex-1 overflow-y-auto p-8 space-y-5 no-scrollbar">
<input type="hidden" id="edit-entry-id"/>
<div class="space-y-2">
<label class="text-xs font-medium text-on-surface-variant">分类 *</label>
<select id="f-category" class="w-full bg-white border border-outline-variant/30 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-secondary">
<option value="基础架构">基础架构</option>
<option value="网络安全">网络安全</option>
<option value="数据库">数据库</option>
<option value="中间件">中间件</option>
<option value="其他">其他</option>
</select>
</div>
<div class="space-y-2">
<label class="text-xs font-medium text-on-surface-variant">问题 *</label>
<textarea id="f-question" class="w-full bg-white border border-outline-variant/30 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-secondary resize-none" placeholder="描述常见故障现象或咨询问题..." rows="3"></textarea>
</div>
<div class="space-y-2">
<label class="text-xs font-medium text-on-surface-variant">解决方案 *</label>
<textarea id="f-solution" class="w-full bg-white border border-outline-variant/30 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-secondary resize-none" placeholder="提供详细的排查步骤、操作指令或解决建议..." rows="8"></textarea>
</div>
<div class="space-y-2">
<label class="text-xs font-medium text-on-surface-variant">标签（逗号分隔）</label>
<input id="f-tags" class="w-full bg-white border border-outline-variant/30 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-secondary" placeholder="K8s, 磁盘, 故障排查..." type="text"/>
</div>
<div id="panel-error" class="hidden text-[13px] text-red-600 bg-red-50 px-3 py-2 rounded-lg"></div>
</div>
<div class="p-6 bg-white border-t border-outline-variant/15 flex gap-3">
<button id="panel-save" class="flex-1 bg-[#1A1A1A] text-white py-2 rounded-lg text-sm font-medium hover:bg-black transition-colors">确认保存</button>
<button id="panel-cancel" class="px-6 py-2 border border-outline-variant/30 rounded-lg text-sm font-medium hover:bg-surface-container-high transition-colors text-on-surface-variant">取消</button>
</div>
</div>
<!-- Panel overlay -->
<div id="kb-overlay" class="hidden fixed inset-0 bg-black/5 z-[55]" onclick="closePanel()"></div>

<script src="api.js"></script>
<script>
  requireAuth();
  bindSidebar();

  let activeCategory = '';

  // Load stats
  getKBStats().then(res => {
    const d = res.data;
    document.getElementById('stat-new-week').textContent = d.new_this_week;
    document.getElementById('stat-writeback').textContent = d.ticket_writeback;
    document.getElementById('stat-avg-score').textContent = d.avg_match_score;
  }).catch(() => {});

  // Category tabs
  document.querySelectorAll('.cat-tab').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.cat-tab').forEach(b => {
        b.classList.remove('border-secondary', 'text-secondary');
        b.classList.add('text-on-surface-variant', 'border-transparent');
      });
      btn.classList.add('border-secondary', 'text-secondary');
      btn.classList.remove('text-on-surface-variant', 'border-transparent');
      activeCategory = btn.dataset.cat;
      loadEntries();
    });
  });

  let searchDebounce;
  document.getElementById('kb-search').addEventListener('input', () => { clearTimeout(searchDebounce); searchDebounce = setTimeout(loadEntries, 400); });
  document.getElementById('kb-source-filter').addEventListener('change', loadEntries);

  function escHtml(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

  async function loadEntries() {
    const keyword = document.getElementById('kb-search').value.trim();
    const source = document.getElementById('kb-source-filter').value;
    const params = { page_size: 50 };
    if (activeCategory) params.category = activeCategory;
    if (source) params.source = source;
    if (keyword) params.keyword = keyword;
    try {
      const res = await getKBEntries(params);
      const d = res.data;
      document.getElementById('kb-total-count').textContent = d.total + ' 条';
      const grid = document.getElementById('kb-grid');
      if (!d.items.length) {
        grid.innerHTML = '<div class="col-span-2 text-center text-on-surface-variant text-sm py-12">暂无知识库条目</div>';
        return;
      }
      grid.innerHTML = d.items.map(e => {
        const srcCls = e.source === 'ticket_writeback'
          ? 'bg-tertiary-container text-on-tertiary-container'
          : 'bg-primary-container text-on-primary-container';
        const srcLabel = e.source === 'ticket_writeback' ? '工单回写' : '人工录入';
        return `<div class="group bg-surface-container-lowest p-6 rounded-xl relative transition-all hover:ring-1 hover:ring-outline-variant/20">
          <div class="flex justify-between items-start mb-4">
            <div class="flex gap-2">
              <span class="px-2 py-0.5 bg-surface-container-high text-on-surface-variant text-[10px] font-medium rounded-full">${escHtml(e.category)}</span>
              <span class="px-2 py-0.5 ${srcCls} text-[10px] font-medium rounded-full">${srcLabel}</span>
            </div>
            <div class="flex gap-3 opacity-0 group-hover:opacity-100 transition-opacity">
              <button onclick="openEditPanel(${e.id})" class="text-on-surface-variant hover:text-secondary text-xs font-medium">编辑</button>
              <button onclick="doDelete(${e.id})" class="text-on-surface-variant hover:text-error text-xs font-medium">删除</button>
            </div>
          </div>
          <h3 class="text-[13px] font-semibold text-on-background mb-2 leading-snug">${escHtml(e.question)}</h3>
          <p class="text-on-surface-variant text-[12px] leading-relaxed line-clamp-2">${escHtml(e.solution)}</p>
          <div class="mt-4 pt-4 border-t border-outline-variant/10 flex justify-between items-center">
            <span class="text-[10px] text-on-surface-variant">最后更新: ${fmtDate(e.updated_at)}</span>
            <span class="flex items-center gap-1 text-[10px] text-secondary font-medium">
              <span class="material-symbols-outlined text-[12px]" style="font-variation-settings: 'FILL' 1;">grade</span>
              ${e.match_score.toFixed(2)} 匹配度
            </span>
          </div>
        </div>`;
      }).join('');
    } catch (err) {
      document.getElementById('kb-grid').innerHTML = `<div class="col-span-2 text-center text-red-500 text-sm py-12">${err.message}</div>`;
    }
  }

  async function doDelete(id) {
    if (!confirm('确认删除此条目？')) return;
    try { await deleteKBEntry(id); loadEntries(); getKBStats().then(r => { const d=r.data; document.getElementById('stat-new-week').textContent=d.new_this_week; document.getElementById('stat-writeback').textContent=d.ticket_writeback; }); }
    catch (err) { alert(err.message); }
  }

  // Panel
  const panel = document.getElementById('kb-panel');
  const overlay = document.getElementById('kb-overlay');

  function openPanel() {
    document.getElementById('panel-error').classList.add('hidden');
    panel.classList.remove('hidden');
    overlay.classList.remove('hidden');
  }

  function closePanel() {
    panel.classList.add('hidden');
    overlay.classList.add('hidden');
    document.getElementById('edit-entry-id').value = '';
    document.getElementById('f-question').value = '';
    document.getElementById('f-solution').value = '';
    document.getElementById('f-tags').value = '';
  }

  document.getElementById('new-entry-btn').addEventListener('click', () => {
    document.getElementById('panel-title').textContent = '新增知识库条目';
    document.getElementById('panel-save').textContent = '确认保存';
    document.getElementById('edit-entry-id').value = '';
    openPanel();
  });
  document.getElementById('panel-close').addEventListener('click', closePanel);
  document.getElementById('panel-cancel').addEventListener('click', closePanel);

  async function openEditPanel(id) {
    // find in current grid data - re-fetch for accuracy
    try {
      const res = await getKBEntries({ page_size: 100 });
      const entry = res.data.items.find(e => e.id === id);
      if (!entry) return;
      document.getElementById('panel-title').textContent = '编辑条目';
      document.getElementById('panel-save').textContent = '保存更改';
      document.getElementById('edit-entry-id').value = id;
      document.getElementById('f-category').value = entry.category;
      document.getElementById('f-question').value = entry.question;
      document.getElementById('f-solution').value = entry.solution;
      document.getElementById('f-tags').value = entry.tags || '';
      openPanel();
    } catch (err) { alert(err.message); }
  }

  document.getElementById('panel-save').addEventListener('click', async () => {
    const errEl = document.getElementById('panel-error');
    errEl.classList.add('hidden');
    const editId = document.getElementById('edit-entry-id').value;
    const category = document.getElementById('f-category').value;
    const question = document.getElementById('f-question').value.trim();
    const solution = document.getElementById('f-solution').value.trim();
    const tags = document.getElementById('f-tags').value.trim() || undefined;

    if (!question || !solution) { errEl.textContent = '请填写问题和解决方案'; errEl.classList.remove('hidden'); return; }
    try {
      if (editId) await updateKBEntry(editId, { category, question, solution, tags });
      else await createKBEntry({ category, question, solution, tags });
      closePanel();
      loadEntries();
      getKBStats().then(r => { const d=r.data; document.getElementById('stat-new-week').textContent=d.new_this_week; document.getElementById('stat-writeback').textContent=d.ticket_writeback; document.getElementById('stat-avg-score').textContent=d.avg_match_score; }).catch(()=>{});
    } catch (err) { errEl.textContent = err.message; errEl.classList.remove('hidden'); }
  });

  loadEntries();
</script>
</body></html>
