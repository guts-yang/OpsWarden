<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>工单系统 - OpsWarden</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script id="tailwind-config">
  tailwind.config = {
    darkMode: "class",
    theme: {
      extend: {
        colors: {
          "on-primary-container": "#525151", "surface-variant": "#dbe4e7", "outline": "#737c7f",
          "surface-tint": "#5f5e5e", "secondary": "#0053dc", "on-secondary-fixed": "#003798",
          "on-error-container": "#752121", "surface-container-low": "#f1f4f6",
          "surface-container-highest": "#dbe4e7", "on-error": "#fff7f6", "surface-dim": "#d1dce0",
          "background": "#f8f9fa", "surface": "#f8f9fa", "secondary-container": "#dbe1ff",
          "on-secondary-fixed-variant": "#0050d4", "surface-container-high": "#e3e9ec",
          "on-background": "#2b3437", "error-container": "#fe8983", "secondary-dim": "#0049c2",
          "primary": "#5f5e5e", "error": "#9f403d", "on-secondary-container": "#0048bf",
          "tertiary-fixed": "#82ff99", "on-surface": "#2b3437", "surface-bright": "#f8f9fa",
          "on-secondary": "#faf8ff", "primary-container": "#e5e2e1", "inverse-primary": "#ffffff",
          "tertiary-container": "#82ff99", "tertiary-dim": "#006127", "on-surface-variant": "#586064",
          "on-tertiary": "#e9ffe6", "surface-container": "#eaeff1", "tertiary": "#006e2e",
          "on-tertiary-container": "#006127", "outline-variant": "#abb3b7",
          "inverse-surface": "#0c0f10", "on-primary": "#faf7f6", "surface-container-lowest": "#ffffff",
          "primary-dim": "#535252",
        },
        fontFamily: { "headline": ["Inter"], "body": ["Inter"], "label": ["Inter"] },
        borderRadius: { "DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "9999px" },
      },
    },
  }
</script>
<style>
  .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; vertical-align: middle; }
  body { font-family: 'Inter', 'Microsoft YaHei', sans-serif; }
</style>
</head>
<body class="bg-background text-on-surface antialiased overflow-hidden">

<!-- Sidebar -->
<aside class="w-[200px] h-full fixed left-0 top-0 bg-[#F1F4F6] flex flex-col py-4 justify-between z-50">
  <div class="flex flex-col gap-1">
    <div class="px-6 mb-8 flex items-center gap-2">
      <div class="w-6 h-6 bg-primary rounded-lg flex items-center justify-center">
        <span class="material-symbols-outlined text-[14px] text-white">security</span>
      </div>
      <span class="text-[14px] font-medium text-[#2B3437]">OpsWarden</span>
    </div>
    <nav class="flex flex-col">
      <a class="px-6 py-2.5 flex items-center gap-3 text-[#5F5E5E] hover:bg-[#DBE4E7] transition-colors text-[14px] font-medium tracking-tight" href="#">
        <span class="material-symbols-outlined">dashboard</span>仪表盘
      </a>
      <a class="px-6 py-2.5 flex items-center gap-3 text-[#5F5E5E] hover:bg-[#DBE4E7] transition-colors text-[14px] font-medium tracking-tight" href="#">
        <span class="material-symbols-outlined">smart_toy</span>AI 问答
      </a>
      <a class="px-6 py-2.5 flex items-center gap-3 text-[#5F5E5E] hover:bg-[#DBE4E7] transition-colors text-[14px] font-medium tracking-tight" href="#">
        <span class="material-symbols-outlined">manage_accounts</span>账号管理
      </a>
      <a class="px-6 py-2.5 flex items-center gap-3 bg-[#F0F4FF] text-[#2563EB] border-l-2 border-[#2563EB] text-[14px] font-medium tracking-tight" href="#">
        <span class="material-symbols-outlined">confirmation_number</span>工单系统
      </a>
      <a class="px-6 py-2.5 flex items-center gap-3 text-[#5F5E5E] hover:bg-[#DBE4E7] transition-colors text-[14px] font-medium tracking-tight" href="#">
        <span class="material-symbols-outlined">auto_stories</span>知识库
      </a>
    </nav>
  </div>
  <div class="px-6">
    <a class="py-2.5 flex items-center gap-3 text-[#5F5E5E] hover:bg-[#DBE4E7] transition-colors text-[14px] font-medium tracking-tight" href="#">
      <span class="material-symbols-outlined">logout</span>退出登录
    </a>
  </div>
</aside>

<!-- Top Bar -->
<header class="h-[52px] fixed top-0 right-0 left-[200px] z-40 bg-white/80 backdrop-blur-md border-b border-[#ABB3B7]/15 flex justify-between items-center px-6">
  <span class="text-[15px] font-medium text-[#1A1A1A]">工单中心</span>
  <button id="new-ticket-btn" class="px-4 py-2 bg-[#1A1A1A] hover:bg-primary-dim text-white rounded-lg text-[14px] font-medium flex items-center gap-2 transition-all">
    <span class="material-symbols-outlined text-[18px]">add</span>新建工单
  </button>
</header>

<!-- Main -->
<main class="ml-[200px] mt-[52px] h-[calc(100vh-52px)] overflow-hidden flex flex-col">

  <!-- Status Tabs -->
  <section class="px-8 pt-6 pb-0 bg-background">
    <div class="flex gap-6 border-b border-outline-variant/15">
      <button class="tab-btn pb-3 text-[14px] text-on-surface-variant hover:text-on-surface border-b-2 border-transparent transition-all" data-status="">全部</button>
      <button class="tab-btn pb-3 text-[14px] text-secondary border-b-2 border-secondary font-medium transition-all" data-status="pending">待处理</button>
      <button class="tab-btn pb-3 text-[14px] text-on-surface-variant hover:text-on-surface border-b-2 border-transparent transition-all" data-status="processing">处理中</button>
      <button class="tab-btn pb-3 text-[14px] text-on-surface-variant hover:text-on-surface border-b-2 border-transparent transition-all" data-status="resolved">已解决</button>
      <button class="tab-btn pb-3 text-[14px] text-on-surface-variant hover:text-on-surface border-b-2 border-transparent transition-all" data-status="closed">已关闭</button>
    </div>
  </section>

  <!-- Split Layout -->
  <section class="flex flex-1 gap-4 px-8 py-4 overflow-hidden">

    <!-- LEFT: List -->
    <div class="w-[38%] bg-surface-container-lowest rounded-xl flex flex-col overflow-hidden shadow-sm">
      <div class="p-4 border-b border-outline-variant/10">
        <div class="relative flex items-center">
          <span class="material-symbols-outlined absolute left-3 text-outline text-[18px]">search</span>
          <input id="search-input" class="w-full pl-10 pr-4 py-2 bg-surface-container-low border-none rounded-lg text-[14px] focus:ring-1 focus:ring-secondary/30 outline-none" placeholder="搜索工单 ID 或关键词..." type="text"/>
        </div>
      </div>
      <div id="ticket-list" class="flex-1 overflow-y-auto">
        <div id="list-loading" class="p-8 text-center text-[14px] text-on-surface-variant">加载中...</div>
      </div>
      <div class="px-4 py-3 border-t border-outline-variant/10 flex justify-between items-center bg-surface-container-low/30">
        <span id="list-info" class="text-[12px] text-on-surface-variant">-</span>
        <div class="flex gap-1">
          <button id="prev-btn" class="p-1 rounded hover:bg-surface-container-highest transition-colors disabled:opacity-30" disabled>
            <span class="material-symbols-outlined text-[18px]">chevron_left</span>
          </button>
          <button id="next-btn" class="p-1 rounded hover:bg-surface-container-highest transition-colors disabled:opacity-30" disabled>
            <span class="material-symbols-outlined text-[18px]">chevron_right</span>
          </button>
        </div>
      </div>
    </div>

    <!-- RIGHT: Detail -->
    <div class="w-[62%] bg-surface-container-lowest rounded-xl flex flex-col overflow-hidden shadow-sm">
      <!-- Empty state -->
      <div id="detail-empty" class="flex-1 flex flex-col items-center justify-center text-on-surface-variant gap-3">
        <span class="material-symbols-outlined text-[48px] opacity-30">inbox</span>
        <p class="text-[14px]">点击左侧工单查看详情</p>
      </div>
      <!-- Detail content -->
      <div id="detail-content" class="hidden flex-col h-full overflow-hidden" style="display:none">
        <div class="px-6 py-4 flex items-center justify-between border-b border-outline-variant/10 flex-shrink-0">
          <div class="flex items-center gap-3">
            <span id="d-ticket-no" class="text-[13px] font-bold text-on-surface-variant"></span>
            <span id="d-status-badge" class="px-2 py-0.5 text-[10px] font-bold rounded-full"></span>
          </div>
          <button id="close-ticket-btn" class="px-3 py-1.5 border border-outline-variant/30 hover:bg-surface-container-high text-on-surface rounded-lg text-[13px] font-medium transition-all">关闭工单</button>
        </div>
        <div class="flex-1 overflow-y-auto px-6 py-6">
          <div class="mb-6">
            <h2 id="d-title" class="text-[18px] font-semibold text-on-surface mb-4"></h2>
            <div class="grid grid-cols-3 gap-4">
              <div class="space-y-1">
                <p class="text-[11px] text-outline uppercase tracking-wider">提单人</p>
                <p id="d-reporter" class="text-[14px] text-on-surface">-</p>
              </div>
              <div class="space-y-1">
                <p class="text-[11px] text-outline uppercase tracking-wider">提单时间</p>
                <p id="d-created" class="text-[14px] text-on-surface">-</p>
              </div>
              <div class="space-y-1">
                <p class="text-[11px] text-outline uppercase tracking-wider">优先级</p>
                <p id="d-priority" class="text-[14px] text-on-surface">-</p>
              </div>
            </div>
          </div>
          <div class="h-px bg-outline-variant/15 my-4"></div>
          <div class="mb-6">
            <div class="flex items-center gap-2 mb-3">
              <span class="w-1 h-4 bg-secondary rounded-full"></span>
              <h3 class="text-[14px] font-semibold text-on-surface">问题描述</h3>
            </div>
            <div class="bg-surface-container-low p-4 rounded-lg">
              <p id="d-description" class="text-[14px] text-on-surface-variant leading-relaxed whitespace-pre-wrap">-</p>
            </div>
          </div>
          <div id="d-solution-section" class="hidden mb-6">
            <div class="h-px bg-outline-variant/15 my-4"></div>
            <div class="flex items-center gap-2 mb-3">
              <span class="w-1 h-4 bg-tertiary rounded-full"></span>
              <h3 class="text-[14px] font-semibold text-on-surface">解决方案</h3>
            </div>
            <div class="bg-green-50 border border-green-100 p-4 rounded-lg">
              <p id="d-solution" class="text-[14px] text-on-surface-variant leading-relaxed whitespace-pre-wrap">-</p>
            </div>
          </div>
          <div class="h-px bg-outline-variant/15 my-4"></div>
          <div class="mb-6">
            <div class="flex items-center gap-2 mb-4">
              <span class="w-1 h-4 bg-secondary rounded-full"></span>
              <h3 class="text-[14px] font-semibold text-on-surface">处理记录</h3>
            </div>
            <div id="d-logs" class="space-y-4 relative ml-2">
              <div class="text-[13px] text-on-surface-variant">加载中...</div>
            </div>
          </div>
          <div id="resolve-form">
            <div class="h-px bg-outline-variant/15 my-4"></div>
            <div class="flex items-center gap-2 mb-3">
              <span class="w-1 h-4 bg-secondary rounded-full"></span>
              <h3 class="text-[14px] font-semibold text-on-surface">填写处理方案</h3>
            </div>
            <textarea id="solution-input" class="w-full p-4 bg-surface-container-lowest border border-outline-variant/30 rounded-xl text-[14px] focus:ring-1 focus:ring-secondary/30 focus:border-secondary outline-none transition-all" placeholder="请详细描述处理过程及最终结果..." rows="4"></textarea>
            <div class="flex items-center gap-2 mt-3">
              <input class="w-4 h-4 rounded border-outline-variant text-secondary focus:ring-secondary/30" id="writeback-cb" type="checkbox" checked/>
              <label class="text-[14px] text-on-surface-variant cursor-pointer" for="writeback-cb">处理后写入知识库（Auto-KB）</label>
            </div>
            <div id="resolve-error" class="hidden text-[13px] text-error mt-2"></div>
            <button id="resolve-btn" class="mt-4 w-full px-6 py-2.5 bg-primary text-on-primary hover:bg-primary-dim rounded-lg text-[14px] font-medium transition-all flex items-center justify-center gap-2">
              <span class="material-symbols-outlined text-[18px]">check_circle</span>标记解决
            </button>
          </div>
        </div>
      </div>
    </div>

  </section>
</main>

<!-- New Ticket Modal -->
<div id="new-ticket-modal" class="hidden fixed inset-0 bg-on-surface/20 backdrop-blur-sm z-[60] flex items-center justify-center">
  <div class="bg-surface-container-lowest rounded-xl shadow-2xl w-full max-w-[480px]">
    <div class="px-8 py-6 border-b border-outline-variant/15 flex justify-between items-center">
      <h2 class="text-[18px] font-medium text-on-surface">新建工单</h2>
      <button id="close-modal-btn" class="p-2 rounded-full hover:bg-surface-container-high transition-colors">
        <span class="material-symbols-outlined">close</span>
      </button>
    </div>
    <div class="px-8 py-6 space-y-5">
      <div class="space-y-1.5">
        <label class="block text-[14px] font-medium text-on-surface">标题 <span class="text-error">*</span></label>
        <input id="m-title" class="w-full px-4 py-2.5 bg-surface-container-low border border-outline-variant/30 rounded-lg text-[14px] focus:ring-1 focus:ring-secondary focus:border-secondary outline-none" placeholder="请简要描述问题" type="text"/>
      </div>
      <div class="space-y-1.5">
        <label class="block text-[14px] font-medium text-on-surface">描述</label>
        <textarea id="m-description" class="w-full px-4 py-2.5 bg-surface-container-low border border-outline-variant/30 rounded-lg text-[14px] focus:ring-1 focus:ring-secondary focus:border-secondary outline-none" placeholder="详细说明问题背景..." rows="3"></textarea>
      </div>
      <div class="space-y-1.5">
        <label class="block text-[14px] font-medium text-on-surface">优先级</label>
        <select id="m-priority" class="w-full px-4 py-2.5 bg-surface-container-low border border-outline-variant/30 rounded-lg text-[14px] focus:ring-1 focus:ring-secondary focus:border-secondary outline-none appearance-none">
          <option value="medium">中</option>
          <option value="high">高</option>
          <option value="urgent">紧急</option>
          <option value="low">低</option>
        </select>
      </div>
      <div id="modal-error" class="hidden text-[13px] text-error"></div>
    </div>
    <div class="px-8 py-5 border-t border-outline-variant/15 flex gap-3">
      <button id="modal-cancel-btn" class="flex-1 px-4 py-2.5 border border-outline-variant/30 rounded-lg text-[14px] text-on-surface-variant hover:bg-surface-container-low transition-colors">取消</button>
      <button id="modal-save-btn" class="flex-1 px-4 py-2.5 bg-[#1A1A1A] text-white rounded-lg text-[14px] font-medium hover:bg-primary-dim transition-colors">创建工单</button>
    </div>
  </div>
</div>

<script src="api.js"></script>
<script>
  requireAuth();
  bindSidebar();

  let currentStatus = 'pending';
  let currentPage = 1;
  const pageSize = 15;
  let currentTicketId = null;
  let searchTimer = null;

  // Tab 切换
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tab-btn').forEach(b => {
        b.className = 'tab-btn pb-3 text-[14px] text-on-surface-variant hover:text-on-surface border-b-2 border-transparent transition-all';
      });
      btn.className = 'tab-btn pb-3 text-[14px] text-secondary border-b-2 border-secondary font-medium transition-all';
      currentStatus = btn.dataset.status;
      currentPage = 1;
      currentTicketId = null;
      showEmpty();
      loadTickets();
    });
  });

  // 搜索
  document.getElementById('search-input').addEventListener('input', () => {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(() => { currentPage = 1; loadTickets(); }, 400);
  });

  // 翻页
  document.getElementById('prev-btn').addEventListener('click', () => { currentPage--; loadTickets(); });
  document.getElementById('next-btn').addEventListener('click', () => { currentPage++; loadTickets(); });

  async function loadTickets() {
    const keyword = document.getElementById('search-input').value.trim();
    const params = { page: currentPage, page_size: pageSize };
    if (currentStatus) params.status = currentStatus;
    if (keyword) params.keyword = keyword;
    document.getElementById('list-loading').style.display = 'block';
    try {
      const res = await getTickets(params);
      const d = res.data;
      renderList(d.items, d.total);
      const start = (currentPage - 1) * pageSize + 1;
      const end = Math.min(currentPage * pageSize, d.total);
      document.getElementById('list-info').textContent = d.total ? `第 ${start}–${end} 条，共 ${d.total} 条` : '暂无工单';
      document.getElementById('prev-btn').disabled = currentPage <= 1;
      document.getElementById('next-btn').disabled = currentPage * pageSize >= d.total;
    } catch (e) {
      document.getElementById('ticket-list').innerHTML = `<div class="p-8 text-center text-[13px] text-error">${e.message}</div>`;
    } finally {
      document.getElementById('list-loading').style.display = 'none';
    }
  }

  function renderList(items, total) {
    const list = document.getElementById('ticket-list');
    if (!items.length) {
      list.innerHTML = '<div class="p-8 text-center text-[13px] text-on-surface-variant">暂无工单</div>';
      return;
    }
    list.innerHTML = items.map(t => {
      const st = TICKET_STATUS[t.status] || { label: t.status, cls: 'bg-slate-50 text-slate-500 border border-slate-100' };
      const pr = TICKET_PRIORITY[t.priority] || { label: t.priority, cls: '' };
      const isActive = t.id === currentTicketId;
      return `<div class="ticket-item p-4 border-l-4 ${isActive ? 'bg-[#F0F4FF] border-[#2563EB]' : 'border-transparent hover:bg-surface-container-low'} transition-colors cursor-pointer" data-id="${t.id}">
        <div class="flex justify-between items-start mb-1">
          <span class="text-[11px] font-bold ${isActive ? 'text-[#2563EB]' : 'text-on-surface-variant'} uppercase tracking-wider">${escHtml(t.ticket_no)}</span>
          <span class="text-[11px] text-outline">${fmtDate(t.created_at)}</span>
        </div>
        <h3 class="text-[14px] font-medium text-on-surface mb-2 line-clamp-2">${escHtml(t.title)}</h3>
        <div class="flex items-center justify-between">
          <span class="text-[12px] text-on-surface-variant">${escHtml(t.reporter_name || '—')}</span>
          <div class="flex items-center gap-1.5">
            <span class="px-2 py-0.5 text-[10px] font-medium rounded-full ${st.cls}">${st.label}</span>
            <span class="px-2 py-0.5 text-[10px] font-bold rounded-full bg-surface-container-highest text-on-surface-variant">${pr.label}</span>
          </div>
        </div>
      </div>`;
    }).join('');
    list.querySelectorAll('.ticket-item').forEach(el => {
      el.addEventListener('click', () => openDetail(parseInt(el.dataset.id)));
    });
  }

  async function loadTabCounts() {
    const statuses = ['pending', 'processing', 'resolved', 'closed'];
    const labels = { pending: '待处理', processing: '处理中', resolved: '已解决', closed: '已关闭' };
    try {
      const [allRes, ...results] = await Promise.all([
        getTickets({ page_size: 1 }),
        ...statuses.map(s => getTickets({ status: s, page_size: 1 }))
      ]);
      document.querySelector('.tab-btn[data-status=""]').textContent = `全部 ${allRes.data.total}`;
      statuses.forEach((s, i) => {
        const btn = document.querySelector(`.tab-btn[data-status="${s}"]`);
        if (btn) btn.textContent = `${labels[s]} ${results[i].data.total}`;
      });
    } catch (_) {}
  }

  async function openDetail(id) {
    currentTicketId = id;
    // 更新列表高亮
    document.querySelectorAll('.ticket-item').forEach(el => {
      const active = parseInt(el.dataset.id) === id;
      el.className = `ticket-item p-4 border-l-4 ${active ? 'bg-[#F0F4FF] border-[#2563EB]' : 'border-transparent hover:bg-surface-container-low'} transition-colors cursor-pointer`;
      el.querySelector('span.text-\\[11px\\]')?.classList.toggle('text-[#2563EB]', active);
    });
    showDetailContent();
    try {
      const [ticketRes, logsRes] = await Promise.all([getTicket(id), getTicketLogs(id)]);
      const t = ticketRes.data;
      const logs = logsRes.data;

      document.getElementById('d-ticket-no').textContent = t.ticket_no;
      const st = TICKET_STATUS[t.status] || { label: t.status, cls: 'bg-slate-50 text-slate-500' };
      const badge = document.getElementById('d-status-badge');
      badge.className = `px-2 py-0.5 text-[10px] font-bold rounded-full ${st.cls}`;
      badge.textContent = st.label;
      document.getElementById('d-title').textContent = t.title;
      document.getElementById('d-reporter').textContent = t.reporter_name || '—';
      document.getElementById('d-created').textContent = fmtDate(t.created_at);
      document.getElementById('d-priority').textContent = (TICKET_PRIORITY[t.priority] || { label: t.priority }).label;
      document.getElementById('d-description').textContent = t.description || '—';

      if (t.solution) {
        document.getElementById('d-solution-section').classList.remove('hidden');
        document.getElementById('d-solution').textContent = t.solution;
      } else {
        document.getElementById('d-solution-section').classList.add('hidden');
      }

      const resolveForm = document.getElementById('resolve-form');
      if (t.status === 'resolved' || t.status === 'closed') {
        resolveForm.style.display = 'none';
      } else {
        resolveForm.style.display = '';
        document.getElementById('solution-input').value = '';
        document.getElementById('resolve-error').classList.add('hidden');
      }
      document.getElementById('close-ticket-btn').disabled = t.status === 'closed';

      renderLogs(logs);
    } catch (e) {
      document.getElementById('d-title').textContent = '加载失败：' + e.message;
    }
  }

  function renderLogs(logs) {
    const el = document.getElementById('d-logs');
    if (!logs.length) { el.innerHTML = '<p class="text-[13px] text-on-surface-variant">暂无操作记录</p>'; return; }
    const actionMap = { created: '工单创建', updated: '工单更新', resolved: '工单解决', closed: '工单关闭', callback: '工单回访', writeback: '回写知识库' };
    el.innerHTML = `<div class="absolute top-0 bottom-0 left-[7px] w-0.5 bg-outline-variant/20"></div>` +
      [...logs].reverse().map(log => `
        <div class="relative pl-8">
          <div class="absolute left-0 top-1 w-4 h-4 rounded-full bg-secondary-container border-2 border-white"></div>
          <div class="flex justify-between items-start mb-0.5">
            <span class="text-[13px] font-medium text-on-surface">${escHtml(actionMap[log.action] || log.action)}</span>
            <span class="text-[11px] text-outline">${fmtDate(log.created_at)}</span>
          </div>
          ${log.operator_name ? `<p class="text-[12px] text-on-surface-variant">操作人：${escHtml(log.operator_name)}</p>` : ''}
          ${log.content ? `<p class="text-[12px] text-on-surface-variant mt-0.5">${escHtml(log.content)}</p>` : ''}
        </div>`).join('');
  }

  function showEmpty() {
    document.getElementById('detail-empty').style.display = '';
    document.getElementById('detail-content').style.display = 'none';
  }

  function showDetailContent() {
    document.getElementById('detail-empty').style.display = 'none';
    document.getElementById('detail-content').style.display = 'flex';
  }

  // 标记解决
  document.getElementById('resolve-btn').addEventListener('click', async () => {
    const solution = document.getElementById('solution-input').value.trim();
    const errEl = document.getElementById('resolve-error');
    if (!solution) { errEl.textContent = '请填写处理方案'; errEl.classList.remove('hidden'); return; }
    errEl.classList.add('hidden');
    try {
      document.getElementById('resolve-btn').disabled = true;
      await resolveTicket(currentTicketId, solution, document.getElementById('writeback-cb').checked);
      await openDetail(currentTicketId);
      loadTabCounts();
    } catch (e) {
      errEl.textContent = e.message; errEl.classList.remove('hidden');
    } finally {
      document.getElementById('resolve-btn').disabled = false;
    }
  });

  // 关闭工单
  document.getElementById('close-ticket-btn').addEventListener('click', async () => {
    if (!currentTicketId) return;
    try {
      await closeTicket(currentTicketId);
      await openDetail(currentTicketId);
      loadTabCounts();
    } catch (e) { alert(e.message); }
  });

  // 新建工单 Modal
  const modal = document.getElementById('new-ticket-modal');
  document.getElementById('new-ticket-btn').addEventListener('click', () => modal.classList.remove('hidden'));
  document.getElementById('close-modal-btn').addEventListener('click', () => modal.classList.add('hidden'));
  document.getElementById('modal-cancel-btn').addEventListener('click', () => modal.classList.add('hidden'));
  document.getElementById('modal-save-btn').addEventListener('click', async () => {
    const title = document.getElementById('m-title').value.trim();
    const description = document.getElementById('m-description').value.trim();
    const priority = document.getElementById('m-priority').value;
    const errEl = document.getElementById('modal-error');
    if (!title) { errEl.textContent = '请填写标题'; errEl.classList.remove('hidden'); return; }
    errEl.classList.add('hidden');
    try {
      document.getElementById('modal-save-btn').disabled = true;
      await createManualTicket(title, description, priority);
      modal.classList.add('hidden');
      document.getElementById('m-title').value = '';
      document.getElementById('m-description').value = '';
      currentPage = 1;
      loadTickets();
      loadTabCounts();
    } catch (e) {
      errEl.textContent = e.message; errEl.classList.remove('hidden');
    } finally {
      document.getElementById('modal-save-btn').disabled = false;
    }
  });

  function escHtml(s) {
    return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }

  // 初始化
  loadTickets();
  loadTabCounts();
</script>
</body>
</html>
