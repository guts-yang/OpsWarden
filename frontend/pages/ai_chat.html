<!DOCTYPE html>
<html lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>AI 问答 - OpsWarden</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; display: inline-block; line-height: 1; text-transform: none; letter-spacing: normal; word-wrap: normal; white-space: nowrap; direction: ltr; }
        body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #f8f9fa; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              colors: {
                "on-primary-container": "#525151","surface-variant": "#dbe4e7","outline": "#737c7f",
                "surface-tint": "#5f5e5e","secondary": "#0053dc","on-secondary-fixed": "#003798",
                "on-error-container": "#752121","surface-container-low": "#f1f4f6",
                "surface-container-highest": "#dbe4e7","on-error": "#fff7f6","surface-dim": "#d1dce0",
                "background": "#f8f9fa","surface": "#f8f9fa","secondary-container": "#dbe1ff",
                "on-secondary-fixed-variant": "#0050d4","surface-container-high": "#e3e9ec",
                "on-background": "#2b3437","error-container": "#fe8983","secondary-dim": "#0049c2",
                "primary": "#5f5e5e","error": "#9f403d","on-secondary-container": "#0048bf",
                "tertiary-fixed": "#82ff99","on-surface": "#2b3437","surface-bright": "#f8f9fa",
                "on-secondary": "#faf8ff","primary-container": "#e5e2e1","inverse-primary": "#ffffff",
                "tertiary-container": "#82ff99","tertiary-dim": "#006127","on-surface-variant": "#586064",
                "on-tertiary": "#e9ffe6","surface-container": "#eaeff1","tertiary": "#006e2e",
                "on-tertiary-container": "#006127","outline-variant": "#abb3b7",
                "inverse-surface": "#0c0f10","on-primary": "#faf7f6","surface-container-lowest": "#ffffff"
              },
              fontFamily: { "headline": ["Inter"], "body": ["Inter"], "label": ["Inter"] },
              borderRadius: {"DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem"},
            },
          },
        }
    </script>
</head>
<body class="flex min-h-screen">
<aside class="w-[200px] h-full fixed left-0 top-0 bg-[#F1F4F6] flex flex-col py-4 justify-between z-50">
<div>
<div class="px-6 mb-8 flex items-center gap-2">
<div class="w-6 h-6 bg-primary rounded-lg flex items-center justify-center">
<span class="material-symbols-outlined text-[16px] text-on-primary">shield</span>
</div>
<span class="text-[14px] font-medium text-[#2B3437]">OpsWarden</span>
</div>
<nav class="flex flex-col gap-1 px-2">
<a class="flex items-center gap-3 px-4 py-2.5 rounded text-[#5F5E5E] hover:bg-[#DBE4E7] transition-colors font-['Inter'] text-[14px] font-medium tracking-tight" href="#">
<span class="material-symbols-outlined text-[20px]">dashboard</span>仪表盘
</a>
<a class="flex items-center gap-3 px-4 py-2.5 rounded bg-[#F0F4FF] text-[#2563EB] border-l-2 border-[#2563EB] font-['Inter'] text-[14px] font-medium tracking-tight" href="#">
<span class="material-symbols-outlined text-[20px]" style="font-variation-settings: 'FILL' 1;">smart_toy</span>AI 问答
</a>
<a class="flex items-center gap-3 px-4 py-2.5 rounded text-[#5F5E5E] hover:bg-[#DBE4E7] transition-colors font-['Inter'] text-[14px] font-medium tracking-tight" href="#">
<span class="material-symbols-outlined text-[20px]">manage_accounts</span>账号管理
</a>
<a class="flex items-center gap-3 px-4 py-2.5 rounded text-[#5F5E5E] hover:bg-[#DBE4E7] transition-colors font-['Inter'] text-[14px] font-medium tracking-tight" href="#">
<span class="material-symbols-outlined text-[20px]">confirmation_number</span>工单系统
</a>
<a class="flex items-center gap-3 px-4 py-2.5 rounded text-[#5F5E5E] hover:bg-[#DBE4E7] transition-colors font-['Inter'] text-[14px] font-medium tracking-tight" href="#">
<span class="material-symbols-outlined text-[20px]">auto_stories</span>知识库
</a>
</nav>
</div>
<div class="px-2">
<a class="flex items-center gap-3 px-4 py-2.5 rounded text-[#5F5E5E] hover:bg-[#DBE4E7] transition-colors font-['Inter'] text-[14px] font-medium tracking-tight" href="#">
<span class="material-symbols-outlined text-[20px]">logout</span>退出登录
</a>
</div>
</aside>
<main class="flex-1 ml-[200px] flex flex-col h-screen overflow-hidden">
<header class="h-[52px] bg-white/80 backdrop-blur-md border-b border-[#ABB3B7]/15 flex justify-between items-center px-6 w-full sticky top-0 z-40">
<div class="flex items-center gap-2">
<span class="font-['Inter'] text-[15px] font-medium text-[#1A1A1A]">AI 问答助手</span>
<div class="flex items-center gap-1.5 ml-4">
<div class="w-1.5 h-1.5 bg-[#16A34A] rounded-full"></div>
<span class="text-[12px] text-[#16A34A] font-medium">在线</span>
</div>
</div>
<div class="flex items-center gap-4">
<button id="clear-btn" class="text-[#5F5E5E] hover:bg-slate-100 rounded-full p-2 transition-opacity flex items-center gap-1">
<span class="material-symbols-outlined text-[20px]">delete_sweep</span>
<span class="text-[13px] font-medium px-1">清空</span>
</button>
</div>
</header>
<div id="chat-messages" class="flex-1 overflow-y-auto bg-background p-6 space-y-6 flex flex-col">
<div class="flex justify-center">
<div class="bg-surface-container-low px-4 py-1.5 rounded-full">
<p class="text-[13px] text-[#6B7280]">你好，我是运维助手，有什么可以帮你？</p>
</div>
</div>
</div>
<div class="bg-white/80 backdrop-blur-xl p-4 border-t border-outline-variant/10">
<div class="flex gap-2 mb-4 overflow-x-auto pb-1 no-scrollbar">
<button class="chip whitespace-nowrap px-3 py-1.5 bg-surface-container-low hover:bg-surface-container-high text-[#5F5E5E] text-[12px] font-medium rounded-full transition-colors border border-outline-variant/10">账号冻结</button>
<button class="chip whitespace-nowrap px-3 py-1.5 bg-surface-container-low hover:bg-surface-container-high text-[#5F5E5E] text-[12px] font-medium rounded-full transition-colors border border-outline-variant/10">VPN问题</button>
<button class="chip whitespace-nowrap px-3 py-1.5 bg-surface-container-low hover:bg-surface-container-high text-[#5F5E5E] text-[12px] font-medium rounded-full transition-colors border border-outline-variant/10">申请权限</button>
<button class="chip whitespace-nowrap px-3 py-1.5 bg-surface-container-low hover:bg-surface-container-high text-[#5F5E5E] text-[12px] font-medium rounded-full transition-colors border border-outline-variant/10">提交工单</button>
</div>
<div class="relative group">
<div class="flex items-end gap-2 bg-surface-container-lowest border border-outline-variant/30 rounded-xl p-2 transition-all group-focus-within:border-secondary group-focus-within:ring-2 group-focus-within:ring-secondary/10">
<textarea id="chat-input" class="flex-1 bg-transparent border-none focus:ring-0 text-[14px] py-2 px-2 min-h-[44px] max-h-[120px] resize-none" placeholder="输入您的问题，如：如何重置 VPN 密码？" rows="1"></textarea>
<div class="flex items-center gap-1 mb-1">
<button id="send-btn" class="w-10 h-10 bg-[#1A1A1A] hover:bg-primary-dim text-white rounded-lg flex items-center justify-center transition-all shadow-lg active:scale-95">
<span class="material-symbols-outlined text-[20px]">send</span>
</button>
</div>
</div>
<div class="flex justify-between mt-2 px-1">
<p class="text-[11px] text-[#ABB3B7]">AI 助手可能会出错，请核实重要信息。</p>
<p class="text-[11px] text-[#ABB3B7]" id="char-count">0/500</p>
</div>
</div>
</div>
</main>
<script src="api.js"></script>
<script>
  requireAuth();
  bindSidebar();

  const chatMessages = document.getElementById('chat-messages');
  const chatInput = document.getElementById('chat-input');
  const sendBtn = document.getElementById('send-btn');
  const charCount = document.getElementById('char-count');

  chatInput.addEventListener('input', () => {
    charCount.textContent = chatInput.value.length + '/500';
    chatInput.style.height = 'auto';
    chatInput.style.height = Math.min(chatInput.scrollHeight, 120) + 'px';
  });

  chatInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });

  sendBtn.addEventListener('click', sendMessage);

  document.querySelectorAll('.chip').forEach(btn => {
    btn.addEventListener('click', () => {
      chatInput.value = btn.textContent.trim();
      chatInput.dispatchEvent(new Event('input'));
      sendMessage();
    });
  });

  document.getElementById('clear-btn').addEventListener('click', () => {
    chatMessages.innerHTML = `<div class="flex justify-center"><div class="bg-surface-container-low px-4 py-1.5 rounded-full"><p class="text-[13px] text-[#6B7280]">你好，我是运维助手，有什么可以帮你？</p></div></div>`;
  });

  function appendUser(text) {
    const now = new Date();
    const time = String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0');
    const div = document.createElement('div');
    div.className = 'flex flex-col items-end gap-2';
    div.innerHTML = `<div class="bg-[#1A1A1A] text-white text-[13px] p-3 px-4 rounded-xl rounded-tr-[2px] max-w-[65%] shadow-sm">${escapeHtml(text)}</div><span class="text-[10px] text-outline-variant px-1">${time}</span>`;
    chatMessages.appendChild(div);
    scrollBottom();
  }

  function appendAI(data) {
    const now = new Date();
    const time = String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0');
    const isKB = data.source === 'kb';
    const badge = isKB ? `<span class="text-[11px] font-medium text-[#2563EB] bg-[#F0F4FF] px-2 py-0.5 rounded">知识库匹配</span>` : `<span class="text-[11px] font-medium text-amber-600 bg-amber-50 px-2 py-0.5 rounded">已创建工单 ${data.ticket_no || ''}</span>`;
    const div = document.createElement('div');
    div.className = 'flex flex-col items-start gap-3';
    div.innerHTML = `<div class="bg-white border border-[#EBEBEB] text-[13px] p-4 rounded-xl rounded-tl-[2px] max-w-[85%] shadow-sm text-[#1A1A1A] leading-relaxed">
      <div class="flex items-center gap-2 mb-3">${badge}</div>
      <p class="whitespace-pre-wrap">${escapeHtml(data.answer)}</p>
    </div><span class="text-[10px] text-outline-variant px-1">${time}</span>`;
    chatMessages.appendChild(div);
    scrollBottom();
  }

  function appendLoading() {
    const div = document.createElement('div');
    div.id = 'ai-loading';
    div.className = 'flex flex-col items-start gap-3';
    div.innerHTML = `<div class="bg-white border border-[#EBEBEB] p-4 rounded-xl rounded-tl-[2px] shadow-sm flex gap-1.5 items-center">
      <span class="w-2 h-2 bg-outline rounded-full animate-bounce" style="animation-delay:0ms"></span>
      <span class="w-2 h-2 bg-outline rounded-full animate-bounce" style="animation-delay:150ms"></span>
      <span class="w-2 h-2 bg-outline rounded-full animate-bounce" style="animation-delay:300ms"></span>
    </div>`;
    chatMessages.appendChild(div);
    scrollBottom();
    return div;
  }

  function scrollBottom() {
    chatMessages.scrollTop = chatMessages.scrollHeight;
  }

  function escapeHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  async function sendMessage() {
    const query = chatInput.value.trim();
    if (!query) return;
    chatInput.value = '';
    charCount.textContent = '0/500';
    chatInput.style.height = 'auto';

    appendUser(query);
    const loading = appendLoading();
    sendBtn.disabled = true;

    try {
      const res = await sendChatMessage(query);
      loading.remove();
      appendAI(res.data);
    } catch (err) {
      loading.remove();
      appendAI({ answer: '请求失败：' + err.message, source: 'fallback' });
    } finally {
      sendBtn.disabled = false;
    }
  }
</script>
</body></html>
