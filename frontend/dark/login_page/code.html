<!DOCTYPE html>

<html class="dark" lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>OpsWarden - 登录系统</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "surface-container-low": "#191b22",
              "on-background": "#e2e2eb",
              "on-primary": "#002f68",
              "surface-variant": "#33343b",
              "surface-dim": "#111319",
              "outline-variant": "#424753",
              "surface-tint": "#acc7ff",
              "primary-fixed-dim": "#acc7ff",
              "surface-container-lowest": "#0c0e14",
              "secondary": "#41eec2",
              "primary-container": "#508ff8",
              "background": "#111319",
              "primary": "#acc7ff",
              "surface": "#111319",
              "on-surface-variant": "#c2c6d5",
              "surface-container": "#1e1f26",
              "outline": "#8c909e"
            },
            fontFamily: {
              "headline": ["Inter", "system-ui", "sans-serif"],
              "body": ["Inter", "system-ui", "sans-serif"],
              "label": ["Inter", "system-ui", "sans-serif"]
            },
            borderRadius: {"DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem"},
          },
        },
      }
    </script>
<style>
        body { font-family: 'Inter', 'System-UI', sans-serif; background-color: #111319; color: #e2e2eb; }
        .grid-pattern {
            background-image: radial-gradient(rgba(172, 199, 255, 0.1) 1px, transparent 1px);
            background-size: 32px 32px;
        }
        .glass-effect {
            backdrop-filter: blur(12px);
            background: rgba(26, 29, 39, 0.7);
        }
        .glow-hover:hover {
            box-shadow: 0 0 20px rgba(172, 199, 255, 0.3);
        }
    </style>
</head>
<body class="h-screen w-full overflow-hidden flex selection:bg-primary/30">
<!-- Left Panel (55%) -->
<section class="hidden lg:flex w-[55%] h-full bg-surface-dim relative overflow-hidden flex-col justify-between p-16 border-r border-outline-variant/10">
<!-- Background Grid -->
<div class="absolute inset-0 grid-pattern opacity-40"></div>
<div class="absolute inset-0 bg-gradient-to-br from-primary/5 via-transparent to-secondary/5"></div>
<!-- Top Content -->
<div class="relative z-10">
<div class="flex items-center gap-3 mb-6">
<div class="w-10 h-10 bg-primary-container rounded-lg flex items-center justify-center shadow-[0_0_15px_rgba(80,143,248,0.4)]">
<span class="material-symbols-outlined text-on-primary-container" style="font-variation-settings: 'FILL' 1;">shield</span>
</div>
</div>
<h1 class="text-[40px] font-extrabold tracking-tighter text-on-background leading-tight mb-2">
                OpsWarden
            </h1>
<p class="text-sm font-medium tracking-[0.2em] text-outline uppercase opacity-80">
                AI-Powered Operations Digital Employee
            </p>
<div class="mt-12 flex flex-col gap-4">
<div class="flex items-center gap-3 px-4 py-3 rounded-xl bg-surface-container-low border border-outline-variant/20 w-fit">
<span class="material-symbols-outlined text-secondary text-sm">security</span>
<span class="text-sm font-medium text-on-surface-variant">智能问答</span>
</div>
<div class="flex items-center gap-3 px-4 py-3 rounded-xl bg-surface-container-low border border-outline-variant/20 w-fit">
<span class="material-symbols-outlined text-primary text-sm">manage_accounts</span>
<span class="text-sm font-medium text-on-surface-variant">账号管理</span>
</div>
<div class="flex items-center gap-3 px-4 py-3 rounded-xl bg-surface-container-low border border-outline-variant/20 w-fit">
<span class="material-symbols-outlined text-secondary text-sm">bolt</span>
<span class="text-sm font-medium text-on-surface-variant">工单自动化</span>
</div>
</div>
</div>
<!-- Bottom Content -->
<div class="relative z-10">
<div class="p-8 rounded-2xl bg-surface-container-low/40 border border-outline-variant/10 backdrop-blur-sm max-w-md">
<div class="flex items-center gap-4">
<img class="w-12 h-12 rounded-lg object-cover grayscale opacity-60" data-alt="Abstract representation of a digital neural network with glowing cyan and blue nodes against a deep dark background" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDpogozlh5kXHsHBMhMMjsV1ow7_sh6v2yaw0t8zLagfaGJm2GvSNf974JaAREFSiidAQnaQym-jIh8QPE12D0e47R32HF-pe_1yweDGfTTkr3_cMGmaIQO0aQ1yaJIW-3jElPz_Q2CE_Q3QaFlEoBNxs9WwX4UPZTKy3kFulrbt7T8E_4wlGPhgRsnqVkGxTXbQqSLgePB9XV96MgdkfK9g_pcZWdZyBke3MzEZLEl4G9DCfuloG3QZldH0ztak-oRCw3zj3rTwmQ"/>
<div>
<p class="text-[10px] font-mono text-outline tracking-widest uppercase mb-1">Infrastructure Status</p>
<div class="flex items-center gap-2">
<span class="w-2 h-2 rounded-full bg-secondary animate-pulse"></span>
<span class="text-xs font-mono text-on-surface-variant">CORE NODES OPERATIONAL</span>
</div>
</div>
</div>
</div>
<p class="mt-8 text-xs font-mono text-outline/50 tracking-wider">
                Powered by DeepSeek · RAG · LangChain
            </p>
</div>
</section>
<!-- Right Panel (45%) -->
<section class="w-full lg:w-[45%] h-full bg-surface-container-low flex items-center justify-center p-6 sm:p-12 relative">
<!-- Subtle Ambient Glow -->
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-96 h-96 bg-primary/5 blur-[120px] rounded-full pointer-events-none"></div>
<div class="w-full max-w-[380px] z-10">
<!-- Header -->
<div class="flex flex-col items-center mb-10 text-center">
<div class="mb-4 w-12 h-12 flex items-center justify-center bg-surface-dim rounded-xl border border-outline-variant/30">
<span class="text-primary font-black text-lg">OW</span>
</div>
<h2 class="text-xl font-bold tracking-tight text-on-background">
                    运维门户登录
                </h2>
<p class="text-sm text-outline mt-1">请使用您的域账号进行身份验证</p>
</div>
<!-- Login Form -->
<form action="#" class="space-y-5">
<div class="space-y-1.5">
<label class="text-xs font-medium text-outline ml-1 uppercase tracking-wider">工号 / 用户名</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline group-focus-within:text-primary transition-colors text-[20px]">person</span>
</div>
<input class="block w-full pl-11 pr-4 py-3.5 bg-surface-dim border-none rounded-xl text-on-background placeholder:text-outline/40 focus:ring-1 focus:ring-primary/40 transition-all text-sm outline-none" placeholder="Enter Username" type="text"/>
</div>
</div>
<div class="space-y-1.5">
<label class="text-xs font-medium text-outline ml-1 uppercase tracking-wider">密码</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline group-focus-within:text-primary transition-colors text-[20px]">lock</span>
</div>
<input class="block w-full pl-11 pr-12 py-3.5 bg-surface-dim border-none rounded-xl text-on-background placeholder:text-outline/40 focus:ring-1 focus:ring-primary/40 transition-all text-sm outline-none" placeholder="••••••••" type="password"/>
<div class="absolute inset-y-0 right-0 pr-4 flex items-center">
<button class="text-outline hover:text-on-background transition-colors" type="button">
<span class="material-symbols-outlined text-[20px]">visibility</span>
</button>
</div>
</div>
</div>
<div class="flex items-center justify-between px-1">
<label class="flex items-center group cursor-pointer">
<input class="w-4 h-4 rounded border-none bg-surface-dim text-primary focus:ring-offset-background focus:ring-primary/20" type="checkbox"/>
<span class="ml-2 text-xs text-outline group-hover:text-on-surface-variant transition-colors">记住我</span>
</label>
<a class="text-xs text-primary/80 hover:text-primary font-medium transition-colors" href="#">忘记密码?</a>
</div>
<button class="w-full py-4 px-6 bg-primary-container text-on-primary font-bold rounded-xl shadow-lg transition-all duration-300 transform active:scale-[0.98] glow-hover flex items-center justify-center gap-2 mt-4" type="submit">
<span>登录系统</span>
<span class="material-symbols-outlined text-[18px]">arrow_forward</span>
</button>
</form>
<!-- Footer Contact -->
<div class="mt-12 text-center">
<p class="text-xs text-outline/60">
                    遇到问题？联系运维热线 
                    <span class="text-on-surface-variant font-mono ml-1">400-XXX-XXXX</span>
</p>
<div class="mt-8 flex justify-center gap-6">
<span class="w-1.5 h-1.5 rounded-full bg-outline-variant/30"></span>
<span class="w-1.5 h-1.5 rounded-full bg-outline-variant/30"></span>
<span class="w-1.5 h-1.5 rounded-full bg-outline-variant/30"></span>
</div>
</div>
</div>
</section>
</body></html>
